              `;
            })
            .join("");
        }

        document.getElementById("jumpPanel").classList.add("show");
        document.getElementById("jumpMask").classList.add("show");
      }

      function jumpToMessage(chatId, msgIdx) {
        if (selectedChatId !== chatId) {
          selectedChatId = chatId;
          render();
        }
        closeMessageIndex();
        shouldAutoScroll = false;
        requestAnimationFrame(() => {
          const messageContainer = document.getElementById("messages");
          const target = messageContainer?.querySelector(`.message-row[data-msg-idx="${msgIdx}"]`);
          if (!target) return;
          target.scrollIntoView({ behavior: "smooth", block: "center" });
          target.classList.add("message-jump-highlight");
          setTimeout(() => {
            target.classList.remove("message-jump-highlight");
          }, 1300);
        });
      }

      function setSending(next) {
        sending = next;
        const btn = document.getElementById("sendButton");
        btn.disabled = false;
        btn.textContent = next ? "停止生成" : "发送";
      }

      function stopStreaming() {
        if (!sending) return;
        if (streamAbortController) {
          streamAbortController.abort();
        }
      }

      function toggleSidebar(show) {
        const sidebar = document.getElementById("sidebar");
        const mask = document.getElementById("sidebarMask");
        sidebar.classList.toggle("show", show);
        mask.classList.toggle("show", show);
      }

      function openSettings(tab = "general") {
        const target = tab || "general";
        settingsTab = target;
        updateSettingsVisibility();
        switchSettingsTab(target);
        document.getElementById("settingsPanel").classList.add("show");
        document.getElementById("settingsMask").classList.add("show");
      }

      function closeSettings() {
        document.getElementById("settingsPanel").classList.remove("show");
        document.getElementById("settingsMask").classList.remove("show");
      }

      function updateSettingsVisibility() {
        const admin = isAdmin();
        document.getElementById("tabAdminBtn").style.display = admin ? "inline-block" : "none";
        document.getElementById("tabModelsBtn").style.display = "inline-block";
        document.getElementById("modelAdminSection").style.display = admin ? "block" : "none";
        document.getElementById("modelReadonlyHint").style.display = admin ? "none" : "block";
        if (!admin && settingsTab === "admin") {
          settingsTab = "general";
        }
      }

      function switchSettingsTab(tab) {
        const admin = isAdmin();
        const tabs = ["general", "models", "agents", "admin"];
        if (!admin && tab === "admin") {
          tab = "general";
        }
        settingsTab = tab;
        tabs.forEach((name) => {
          const tabEl = document.getElementById(`tab${name.charAt(0).toUpperCase()}${name.slice(1)}Btn`);
          const bodyEl = document.getElementById(`settings${name.charAt(0).toUpperCase()}${name.slice(1)}`);
          if (tabEl) tabEl.classList.toggle("active", name === tab);
          if (bodyEl) bodyEl.classList.toggle("show", name === tab);
        });
      }

      async function checkAuth() {
        try {
          const status = await api("/api/auth/status", { method: "GET", headers: {} });
          authStatusCache = status;
          applyAppMeta(status?.app);
          if (status.need_setup) {
            showLogin(true);
            showAuthPanels("setup");
            document.getElementById("loginError").textContent = "";
            return;
          }
          if (status.authorized) {
            showLogin(false);
            await loadState();
            return;
          }
          showLogin(true);
          showAuthPanels("login");
        } catch (e) {
          showLogin(true);
          showAuthPanels("login");
          const loginError = document.getElementById("loginError");
          if (loginError) {
            loginError.textContent = e?.message ? `连接失败：${e.message}` : "连接失败，请稍后重试";
          }
        }
      }

      async function initApp() {
        const setupError = document.getElementById("setupError");
        setupError.textContent = "";
        const app_title = document.getElementById("setupAppTitle").value.trim();
        const app_subtitle = document.getElementById("setupAppSubtitle").value.trim();
        const admin_password = document.getElementById("setupAdminPassword").value;
        const confirm = document.getElementById("setupAdminPasswordConfirm").value;
        const default_model_name = document.getElementById("setupModelName").value.trim();
        const default_base_url = document.getElementById("setupModelUrl").value.trim();
        const default_api_key = document.getElementById("setupModelKey").value.trim();
        if (!admin_password) {
          setupError.textContent = "管理员密码不能为空";
          return;
        }
        if (admin_password !== confirm) {
          setupError.textContent = "两次密码输入不一致";
          return;
        }
        try {
          await api("/api/setup/init", {
            method: "POST",
            body: JSON.stringify({
              app_title: app_title || null,
              app_subtitle: app_subtitle || null,
              admin_password,
              default_model_name: default_model_name || null,
              default_base_url: default_base_url || null,
              default_api_key: default_api_key || null,
            }),
          });
          await checkAuth();
        } catch (e) {
          setupError.textContent = e.message || "初始化失败";
        }
      }

      async function login() {
        const username = document.getElementById("username").value.trim() || "admin";
        const password = document.getElementById("password").value;
        const loginError = document.getElementById("loginError");
        loginError.textContent = "";
        if (!password) {
          loginError.textContent = "请输入密码";
          return;
        }
        try {
          await api("/api/auth/login", {
            method: "POST",
            body: JSON.stringify({ username, password }),
          });
          await checkAuth();
        } catch (e) {
          loginError.textContent = e.message || "登录失败";
        }
      }

      async function logout() {
        await api("/api/auth/logout", { method: "POST", body: "{}" });
        state = null;
        selectedChatId = null;
        chatSearchQuery = "";
        chatSearchIndex = new Map();
        chatSearchMessageIndex = new Map();
        chatSearchMessageResults = [];
        chatSearchResultCursor = -1;
        chatSearchActiveMessageKey = "";
        chatSearchActiveResultKey = "";
        if (chatSearchTimer) {
          window.clearTimeout(chatSearchTimer);
          chatSearchTimer = null;
        }
        syncChatSearchInput();
        showLogin(true);
        showAuthPanels("login");
      }

      async function loadState() {
        state = await api("/api/state", { method: "GET", headers: {} });
        applyAppMeta(state?.app);
        updateSettingsVisibility();
        buildChatSearchIndex();
        if (!selectedChatId && state.chats.length > 0) {
          selectedChatId = state.chats[0].id;
        }
        if (selectedChatId && !state.chats.some((c) => c.id === selectedChatId)) {
          selectedChatId = state.chats[0]?.id || null;
        }
        if (messageIndexChatId && !state.chats.some((c) => c.id === messageIndexChatId)) {
          closeMessageIndex();
        }
        refreshChatSearchResults();
        syncChatSearchInput();
        render();
      }

      function render() {
        renderChats();
        renderMessages();
        renderModels();
        renderAgents();
        renderUserRetentionSettings();
        renderAdminSettings();
        fillSelectors();
      }

      function renderUserRetentionSettings() {
        const fallbackTtl = Number(state?.app?.message_ttl_hours || 0);
        const currentUser = state?.current_user || {};
        document.getElementById("messageTextTtlHours").value = Number(
          currentUser.message_text_ttl_hours ?? fallbackTtl,
        );
        document.getElementById("messageMediaTtlHours").value = Number(
          currentUser.message_media_ttl_hours ?? fallbackTtl,
        );
      }

      function renderChats() {
        const el = document.getElementById("chats");
        if (!state.chats.length) {
          el.innerHTML = `<div class="list-card" style="text-align:center;color:#6b7c88;">还没有对话，先创建一个吧</div>`;
          return;
        }
        const filteredChats = getFilteredChats();
        if (!filteredChats.length) {
          el.innerHTML = `<div class="list-card" style="text-align:center;color:#6b7c88;">未找到匹配消息</div>`;
          return;
        }
        el.innerHTML = filteredChats
          .map((c) => {
            const selected = selectedChatId === c.id ? "selected" : "";
            return `
              <div class="chat-item ${selected}" onclick="selectChat('${c.id}')">
                <div class="chat-item-corner-actions">
                  <button
                    class="chat-item-delete"
                    onclick="event.stopPropagation();deleteChat('${c.id}')"
                    aria-label="删除对话"
                    title="删除对话"
                  >
                    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                      <path d="M4 7h16M9.5 4.5h5M10 11v6M14 11v6M7.5 7l1 12h7l1-12" />
                    </svg>
                  </button>
                  <button
                    class="chat-item-export"
                    onclick="event.stopPropagation();downloadChatMarkdown('${c.id}')"
                    aria-label="下载MD"
                    title="下载MD"
                  >
                    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                      <path d="M12 4v9M8 10l4 4 4-4M5 19h14" />
                    </svg>
                  </button>
                  <button
                    class="chat-item-outline"
                    onclick="event.stopPropagation();openMessageIndex('${c.id}')"
                    aria-label="消息目录"
                    title="消息目录"
                  >
                    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                      <path d="M6 7h12M6 12h12M6 17h9" />
                    </svg>
                  </button>
                </div>
                <div class="chat-item-title">${escapeHtml(c.title || "新对话")}</div>
                <div class="chat-item-foot">
                  <span>${(c.messages || []).length} 条消息</span>
                </div>
              </div>
            `;
          })
          .join("");
      }

      function renderMessages() {
        const chat = selectedChat();
        const mainTitle = document.getElementById("chatTitleMain");
        const subTitle = document.getElementById("chatTitleSub");
        const msgEl = document.getElementById("messages");
        const shouldScrollToBottom = shouldAutoScroll || isNearBottom(msgEl);

        if (!chat) {
          mainTitle.textContent = "消息";
          subTitle.textContent = "请先创建一个会话";
          msgEl.innerHTML = `
            <div class="empty-state">
              <div>还没有打开的会话</div>
              <button onclick="newChat()">新建对话</button>
            </div>
          `;
          return;
        }

        mainTitle.textContent = chat.title || "新对话";
        subTitle.textContent = `${(chat.messages || []).length} 条消息`;

        const messages = chat.messages || [];
        if (!messages.length) {
          msgEl.innerHTML = `
            <div class="empty-state">
              <div>开始你的第一条消息</div>
            </div>
          `;
          return;
        }

        const renderedRows = messages
          .map((m, idx) => {
            const role = m.role === "user" ? "user" : "assistant";
            const assistantName = getAssistantIdentityName(m, chat);
            const name = role === "user" ? "你" : assistantName;
            const avatar = role === "user" ? "U" : getAssistantAvatar(assistantName);
            const messageKey = `${chat.id}:${idx}`;
            const searchHitClass = messageKey === chatSearchActiveMessageKey ? "search-hit-active" : "";
            return `
              <div class="message-row ${role} ${searchHitClass}" data-msg-idx="${idx}">
                <div class="message-avatar">${avatar}</div>
                <div class="message-content">
                  <div class="message-meta">${name}</div>
                  <div class="message-bubble message-bubble-with-actions">
                    <div class="message-bubble-main">${renderMessageContent(m.content || "")}${renderMessageAttachments(m.attachments || [])}</div>
                    <div class="message-action-row">
                      <button class="message-action-btn" type="button" onclick="copyMessagePlainText('${chat.id}', ${idx}, this)" aria-label="复制文本" title="复制文本">
                        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                          <path d="M9 8h10v12H9zM15 8V5H5v12h4" />
                        </svg>
                      </button>
                      <button class="message-action-btn" type="button" onclick="downloadMessageMarkdown('${chat.id}', ${idx})" aria-label="下载MD" title="下载MD">
                        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                          <path d="M12 4v9M8 10l4 4 4-4M5 19h14" />
                        </svg>
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            `;
          })
          .join("");

        const pendingRow =
          pendingReply && pendingReply.chatId === chat.id
            ? `
              <div class="message-row assistant" id="pending-row-${chat.id}">
                <div class="message-avatar">${getAssistantAvatar(pendingReply.agentName || "助手")}</div>
                <div class="message-content">
                  <div class="message-meta">${escapeHtml(pendingReply.agentName || "助手")}</div>
                  <div class="message-bubble">
                    ${
                      pendingReply.mode === "typing"
                        ? `<div class="typing-stream"><div class="pending-stream-render">${renderStreamingContent(
                            pendingReply.content || "",
                          )}</div><span class="typing-cursor"></span></div>`
                        : `<div class="typing-indicator">
                            <span>思考中</span>
                            <span class="typing-dots">
                              <span class="typing-dot"></span>
                              <span class="typing-dot"></span>
                              <span class="typing-dot"></span>
                            </span>
                          </div>`
                    }
                  </div>
                </div>
              </div>
            `
            : "";

        msgEl.innerHTML = renderedRows + pendingRow;

        applyCodeHighlighting(msgEl);
        applySearchHighlights(msgEl);
        if (shouldScrollToBottom) {
          scrollMessagesToBottomIfNeeded(true);
        } else {
          shouldAutoScroll = false;
        }
      }

      function renderModels() {
        const el = document.getElementById("models");
        if (!state.models.length) {
          el.innerHTML = `<div class="list-card" style="color:#6b7c88;">还没有模型配置</div>`;
          return;
        }
        const defaultModelId = state.default_model_id || "";
        const admin = isAdmin();
        el.innerHTML = state.models
          .map((m) => {
            const checked = m.id === defaultModelId ? "checked" : "";
            const tag = m.id === defaultModelId ? `<span class="default-tag">默认模型</span>` : `<span></span>`;
            const sub = admin ? `<div class="list-sub">${escapeHtml(m.base_url || "(未配置 base_url)")}</div>` : "";
            const keySub = admin
              ? `<div class="list-sub">key: ${escapeHtml(displayModelMaskedKey(m))}</div>`
              : "";
            const streamChecked = m.use_streaming === false ? "" : "checked";
            const streamControl = admin
              ? `
                  <label class="default-check">
                    <input type="checkbox" ${streamChecked} onchange="setModelStreaming('${m.id}', this.checked)" />
                    流传输
                  </label>
                `
              : `<span class="list-sub">流传输：${m.use_streaming === false ? "关" : "开"}</span>`;
            return `
              <div class="list-card">
                <div class="list-title">${escapeHtml(m.name)}</div>
                ${sub}
                ${keySub}
                <div class="list-actions">
                  ${tag}
                  ${streamControl}
                  <label class="default-check">
                    <input type="checkbox" ${checked} onchange="setDefaultModel('${m.id}', this.checked)" />
                    设为默认
                  </label>
                  ${admin ? `<button class="danger-btn" onclick="deleteModel('${m.id}')">删除</button>` : ""}
                </div>
              </div>
            `;
          })
          .join("");
      }

function renderAgents() {
        const el = document.getElementById("agents");
        if (!state.masks.length) {
          el.innerHTML = `<div class="list-card" style="color:#6b7c88;">还没有 Agent 配置</div>`;
          return;
        }
        const defaultAgentId = state.default_mask_id || "";
        const admin = isAdmin();
        el.innerHTML = state.masks
          .map((m) => {
            const checked = m.id === defaultAgentId ? "checked" : "";
            const tags = [];
            if (m.id === defaultAgentId) tags.push(`<span class="default-tag">默认 Agent</span>`);
            if (m.is_public) tags.push(`<span class="default-tag">公共</span>`);
            if (m.is_builtin) tags.push(`<span class="default-tag">内置</span>`);
            const tagsHtml = tags.length ? tags.join(" ") : `<span></span>`;
            const canEdit = Boolean(m.can_edit);
            const canTogglePublic = admin && canEdit && !m.is_builtin;
            const publicChecked = m.is_public ? "checked" : "";
            const publicDisabled = canTogglePublic ? "" : "disabled";
            return `
              <div class="list-card">
                <div class="list-title">${escapeHtml(m.name)}</div>
                <div class="list-sub">${escapeHtml((m.prompt || "").slice(0, 120))}</div>
                <div class="list-actions">
                  ${tagsHtml}
                  <label class="default-check">
                    <input type="checkbox" ${checked} onchange="setDefaultAgent('${m.id}', this.checked)" />
                    设为默认
                  </label>
                  <label class="default-check">
                    <input type="checkbox" ${publicChecked} ${publicDisabled} onchange="setAgentPublic('${m.id}', this.checked)" />
                    设为公共
                  </label>
                  ${
                    canEdit
                      ? `<button class="ghost-btn mini-btn" onclick="editAgent('${m.id}')">编辑</button>
                         <button class="danger-btn mini-btn" onclick="deleteAgent('${m.id}')">删除</button>`
                      : `<span class="list-sub">只读（公共）</span>`
                  }
                </div>
              </div>
            `;
          })
          .join("");
      }

      function fillSelectors() {
        const modelSel = document.getElementById("chatModel");
        const agentSel = document.getElementById("chatAgent");
        const reasoningSel = document.getElementById("chatReasoning");
        const chat = selectedChat();
        const selectedModelId = chat?.model_id || state.default_model_id || "";
        const selectedAgentId = chat?.mask_id || state.default_mask_id || "";
        const selectedReasoning = normalizeReasoningEffort(chat?.reasoning_effort || "");
        const selectableModels = (state.models || []).filter((m) => m.enabled !== false);

        if (!selectableModels.length) {
          modelSel.innerHTML = `<option value="">(请先配置模型)</option>`;
        } else {
          modelSel.innerHTML = selectableModels
            .map(
              (m) =>
                `<option value="${m.id}" ${m.id === selectedModelId ? "selected" : ""}>${escapeHtml(m.name)}</option>`,
            )
            .join("");
        }

        agentSel.innerHTML =
          `<option value="">不使用Agent</option>` +
          state.masks
            .map(
              (m) =>
                `<option value="${m.id}" ${m.id === selectedAgentId ? "selected" : ""}>${escapeHtml(m.name)}</option>`,
            )
            .join("");

        if (reasoningSel) {
          reasoningSel.innerHTML = REASONING_EFFORT_OPTIONS.map(
            (item) =>
              `<option value="${item.value}" ${item.value === selectedReasoning ? "selected" : ""}>${item.label}</option>`,
          ).join("");
        }
      }

      function selectorConfigPayload() {
        const model_id = document.getElementById("chatModel")?.value || "";
        const mask_id = document.getElementById("chatAgent")?.value || "";
        const reasoning_effort = normalizeReasoningEffort(
          document.getElementById("chatReasoning")?.value || "",
        );
        return {
          model_id: model_id || null,
          mask_id: mask_id || null,
          reasoning_effort: reasoning_effort || null,
        };
      }

      async function saveCurrentChatConfig() {
        const chat = selectedChat();
        if (!chat) return;
        const payload = selectorConfigPayload();
        if (
          (chat.model_id || null) === payload.model_id &&
          (chat.mask_id || null) === payload.mask_id &&
          (normalizeReasoningEffort(chat.reasoning_effort || "") || null) === payload.reasoning_effort
        ) {
          return;
        }
        try {
          const res = await api(`/api/chats/${chat.id}/config`, {
            method: "POST",
            body: JSON.stringify(payload),
          });
          const nextChat = res?.chat;
          if (nextChat && Array.isArray(state?.chats)) {
            const idx = state.chats.findIndex((c) => c.id === nextChat.id);
            if (idx >= 0) {
              state.chats[idx] = nextChat;
            }
          } else {
            chat.model_id = payload.model_id;
            chat.mask_id = payload.mask_id;
            chat.reasoning_effort = payload.reasoning_effort;
          }
        } catch (e) {
          document.getElementById("sendError").textContent = e.message || "保存会话配置失败";
          await loadState();
        }
      }

      function resetAgentForm() {
        editingAgentId = null;
        document.getElementById("agentName").value = "";
        document.getElementById("agentPrompt").value = "";
        document.getElementById("agentFormTitle").textContent = "新增 Agent";
        document.getElementById("saveAgentBtn").textContent = "保存 Agent";
        document.getElementById("cancelEditAgentBtn").style.display = "none";
      }

      function editAgent(id) {
        const agent = (state?.masks || []).find((m) => m.id === id);
        if (!agent || !agent.can_edit) return;
        editingAgentId = id;
        document.getElementById("agentName").value = agent.name || "";
        document.getElementById("agentPrompt").value = agent.prompt || "";
        document.getElementById("agentFormTitle").textContent = "编辑 Agent";
        document.getElementById("saveAgentBtn").textContent = "更新 Agent";
        document.getElementById("cancelEditAgentBtn").style.display = "inline-block";
        switchSettingsTab("agents");
      }

      async function saveModel() {
        if (!isAdmin()) return;
        const name = document.getElementById("modelName").value.trim();
        const base_url = document.getElementById("modelUrl").value.trim();
        const api_key = document.getElementById("modelKey").value.trim();
        if (!name) return;
        await api("/api/models", {
          method: "POST",
          body: JSON.stringify({
            name,
            base_url,
            api_key,
            provider: "openai-compatible",
            enabled: true,
            use_streaming: true,
          }),
        });
        document.getElementById("modelName").value = "";
        document.getElementById("modelUrl").value = "";
        document.getElementById("modelKey").value = "";
        await loadState();
      }

      async function deleteModel(id) {
        if (!isAdmin()) return;
        if (!(await showConfirmDialog("确认删除这个模型吗？", "删除模型"))) return;
        await api(`/api/models/${id}`, { method: "DELETE", headers: {} });
        await loadState();
      }

      async function setModelStreaming(id, checked) {
        if (!isAdmin()) return;
        await api(`/api/models/${id}/streaming`, {
          method: "POST",
          body: JSON.stringify({
            use_streaming: !!checked,
          }),
        });
        await loadState();
      }

      async function setDefaultModel(id, checked) {
        if (!checked) {
          if (!(await showConfirmDialog("要取消默认模型吗？", "取消默认模型"))) {
            await loadState();
            return;
          }
          await api("/api/default-model", {
            method: "POST",
            body: JSON.stringify({ model_id: null }),
          });
          await loadState();
          return;
        }
        await api("/api/default-model", {
          method: "POST",
          body: JSON.stringify({ model_id: id }),
        });
        await loadState();
      }

      async function saveAgent() {
        const name = document.getElementById("agentName").value.trim();
        const prompt = document.getElementById("agentPrompt").value;
        if (!name) return;
        await api("/api/masks", {
          method: "POST",
          body: JSON.stringify({ id: editingAgentId, name, prompt }),
        });
        resetAgentForm();
        await loadState();
      }

      async function deleteAgent(id) {
        if (!(await showConfirmDialog("确认删除这个 Agent 吗？", "删除 Agent"))) return;
        await api(`/api/masks/${id}`, { method: "DELETE", headers: {} });
        if (editingAgentId === id) {
          resetAgentForm();
        }
        await loadState();
      }

      async function setDefaultAgent(id, checked) {
        if (!checked) {
          if (!(await showConfirmDialog("要取消默认 Agent 吗？", "取消默认 Agent"))) {
            await loadState();
            return;
          }
          await api("/api/default-agent", {
            method: "POST",
            body: JSON.stringify({ agent_id: null }),
          });
          await loadState();
          return;
        }
        await api("/api/default-agent", {
          method: "POST",
          body: JSON.stringify({ agent_id: id }),
        });
        await loadState();
      }

      async function setAgentPublic(id, checked) {
        if (!isAdmin()) {
          await loadState();
          return;
        }
        try {
          await api(`/api/masks/${id}/public`, {
            method: "POST",
            body: JSON.stringify({ is_public: Boolean(checked) }),
          });
          await loadState();
        } catch (e) {
          document.getElementById("sendError").textContent = e.message || "设置公共 Agent 失败";
          await loadState();
        }
      }

      function renderAdminSettings() {
        if (!isAdmin()) {
          document.getElementById("usersList").innerHTML = "";
          return;
        }
        document.getElementById("appDisplayTitle").value = state?.app?.title || "";
        document.getElementById("appDisplaySubtitle").value = state?.app?.subtitle || "";
        renderUsers();
      }

      function renderUsers() {
        const users = Array.isArray(state?.users) ? state.users : [];
        const el = document.getElementById("usersList");
        if (!users.length) {
          el.innerHTML = `<div class="list-card" style="color:#6b7c88;">暂无账号</div>`;
          return;
        }
        const currentUserId = state?.current_user?.id || "";
        el.innerHTML = users
          .map((u) => {
            const isSelf = u.id === currentUserId;
            const roleText = u.role === "admin" ? "管理员" : "普通用户";
            return `
              <div class="list-card">
                <div class="list-title">${escapeHtml(u.username)} <span class="list-sub">(${roleText})</span></div>
                <div class="list-actions">
                  <button class="ghost-btn mini-btn" onclick="resetUserPassword('${u.id}')">重置密码</button>
                  <button class="danger-btn mini-btn" ${isSelf ? "disabled" : ""} onclick="deleteUser('${u.id}')">删除账号</button>
                </div>
              </div>
            `;
          })
          .join("");
      }

      async function saveRetentionSettings() {
        const message_text_ttl_hours = Number(document.getElementById("messageTextTtlHours").value || 0);
        const message_media_ttl_hours = Number(document.getElementById("messageMediaTtlHours").value || 0);
        await api("/api/user/retention-settings", {
          method: "POST",
          body: JSON.stringify({
            message_text_ttl_hours: Number.isFinite(message_text_ttl_hours)
              ? Math.max(0, Math.floor(message_text_ttl_hours))
              : 0,
            message_media_ttl_hours: Number.isFinite(message_media_ttl_hours)
              ? Math.max(0, Math.floor(message_media_ttl_hours))
              : 0,
          }),
        });
        await loadState();
      }

      async function saveAppSettings() {
        if (!isAdmin()) return;
        const app_title = document.getElementById("appDisplayTitle").value.trim();
        const app_subtitle = document.getElementById("appDisplaySubtitle").value.trim();
        await api("/api/admin/app-settings", {
          method: "POST",
          body: JSON.stringify({
            app_title: app_title || null,
            app_subtitle: app_subtitle || null,
          }),
        });
        await loadState();
      }

      async function purgeMyChats() {
        const ok = await showConfirmDialog(
          "将清空你自己的全部会话数据（含消息、附件文本与图片记录），且不可恢复。确认继续吗？",
          "删除我的全部会话数据",
        );
        if (!ok) return;
        await api("/api/chats/clear", {
          method: "POST",
          body: "{}",
        });
        selectedChatId = null;
        if (messageIndexChatId) {
          closeMessageIndex();
        }
        await loadState();
      }

      async function purgeAllChats() {
        if (!isAdmin()) return;
        const ok = await showConfirmDialog(
          "将清空所有用户的全部会话数据（含消息、附件文本与图片记录），且不可恢复。确认继续吗？",
          "删除所有用户会话数据",
        );
        if (!ok) return;
        await api("/api/admin/chats/clear", {
          method: "POST",
          body: "{}",
        });
        selectedChatId = null;
        if (messageIndexChatId) {
          closeMessageIndex();
        }
        await loadState();
      }

      async function createUser() {
        if (!isAdmin()) return;
        const errorEl = document.getElementById("adminUserError");
        errorEl.textContent = "";
        const username = document.getElementById("newUsername").value.trim();
        const password = document.getElementById("newUserPassword").value;
        const role = document.getElementById("newUserRole").value || "user";
        if (!username || !password) {
          errorEl.textContent = "用户名和密码不能为空";
          return;
        }
        try {
          await api("/api/admin/users", {
            method: "POST",
            body: JSON.stringify({ username, password, role }),
          });
          document.getElementById("newUsername").value = "";
          document.getElementById("newUserPassword").value = "";
          document.getElementById("newUserRole").value = "user";
          await loadState();
        } catch (e) {
          errorEl.textContent = e.message || "创建失败";
        }
      }

      async function resetUserPassword(userId) {
        if (!isAdmin()) return;
        const password = window.prompt("请输入新密码：");
        if (!password) return;
        await api(`/api/admin/users/${userId}/password`, {
          method: "POST",
          body: JSON.stringify({ password }),
        });
      }

      async function deleteUser(userId) {
        if (!isAdmin()) return;
        if (!(await showConfirmDialog("确认删除这个账号吗？", "删除账号"))) return;
        await api(`/api/admin/users/${userId}`, { method: "DELETE", headers: {} });
        await loadState();
      }

      async function newChat() {
        const created = await api("/api/chats", {
          method: "POST",
          body: JSON.stringify({ title: "新对话" }),
        });
        if (created?.chat?.id) {
          selectedChatId = created.chat.id;
        }
        if (messageIndexChatId && messageIndexChatId !== selectedChatId) {
          closeMessageIndex();
        }
        shouldAutoScroll = true;
        await loadState();
      }

      async function deleteChat(id) {
        if (!(await showConfirmDialog("确认删除这个对话吗？", "删除对话"))) return;
        await api(`/api/chats/${id}`, { method: "DELETE", headers: {} });
        if (selectedChatId === id) selectedChatId = null;
        await loadState();
      }

      function selectChat(id) {
        selectedChatId = id;
        if (messageIndexChatId && messageIndexChatId !== id) {
          closeMessageIndex();
        }
        if (normalizeSearchText(chatSearchQuery)) {
          const hitIdx = chatSearchMessageResults.findIndex((item) => item.chatId === id);
          if (hitIdx >= 0) {
            chatSearchResultCursor = hitIdx;
            chatSearchActiveMessageKey = chatSearchMessageResults[hitIdx].key;
            chatSearchActiveResultKey = chatSearchMessageResults[hitIdx].id;
          }
        }
        updateChatSearchNavigator();
        shouldAutoScroll = true;
        render();
        if (window.innerWidth <= 900) {
          toggleSidebar(false);
        }
      }

      async function sendMessage() {
        if (sending) {
          stopStreaming();
          return;
        }
        const errorEl = document.getElementById("sendError");
        const messageInput = document.getElementById("messageText");
        const message = messageInput.value.trim();
        const outgoingAttachments = serializeOutgoingAttachments();
        if (!message && !outgoingAttachments.length) {
          errorEl.textContent = "请输入消息或添加附件";
          return;
        }

        const model_id = document.getElementById("chatModel").value;
        if (!model_id) {
          errorEl.textContent = "请先选择模型";
          return;
        }
        const selectedModel = (state?.models || []).find((m) => m.id === model_id);
        const isStreamingEnabled = selectedModel?.use_streaming !== false;
        const agent_id = document.getElementById("chatAgent").value || null;
        const selectedAgentName = findMaskById(agent_id)?.name || "";
        const reasoning_effort = normalizeReasoningEffort(document.getElementById("chatReasoning")?.value || "");

        let chat = selectedChat();
        if (!chat) {
          const created = await api("/api/chats", {
            method: "POST",
            body: JSON.stringify({
              title: "新对话",
              model_id: model_id || null,
              mask_id: agent_id,
              reasoning_effort: reasoning_effort || null,
            }),
          });
          if (created?.chat?.id) {
            selectedChatId = created.chat.id;
            chat = created.chat;
            if (!Array.isArray(state?.chats)) {
              state.chats = [];
            }
            if (!state.chats.some((c) => c.id === chat.id)) {
              state.chats.unshift(chat);
            }
          } else {
            await loadState();
            chat = selectedChat();
          }
          if (!chat) {
            errorEl.textContent = "创建会话失败，请稍后再试";
            return;
          }
        }

        const originalMessage = message;
        const originalPendingAttachments = pendingAttachments.map((att) => ({ ...att }));
        messageInput.value = "";
        clearPendingAttachments();
        errorEl.textContent = "";
        setSending(true);

        const optimisticUserMessage = {
          id: `local-${Date.now()}`,
          role: "user",
          content: originalMessage,
          created_at: Math.floor(Date.now() / 1000),
        };
        if (outgoingAttachments.length) {
          optimisticUserMessage.attachments = outgoingAttachments.map((att) => ({ ...att }));
        }
        if (!Array.isArray(chat.messages)) {
          chat.messages = [];
        }
        chat.messages.push(optimisticUserMessage);
        const currentTitle = String(chat.title || "").trim();
        if (!currentTitle || currentTitle === "新对话") {
          const fallbackTitle = originalMessage || outgoingAttachments[0]?.name || "新对话";
          chat.title = buildChatTitlePreview(fallbackTitle);
        }

        pendingReply = {
          chatId: chat.id,
          startedAt: Date.now(),
          mode: "waiting",
          content: "",
          agentName: selectedAgentName || "助手",
          deferRender: false,
        };
        shouldAutoScroll = true;
        renderChats();
        renderMessages();

        const abortController = isStreamingEnabled ? new AbortController() : null;
        streamAbortController = abortController;
        let abortedByUser = false;
        try {
          if (!isStreamingEnabled) {
            await api("/api/chat", {
              method: "POST",
              body: JSON.stringify({
                chat_id: chat.id,
                message: originalMessage,
                model_id,
                mask_id: agent_id,
                reasoning_effort: reasoning_effort || null,
                attachments: outgoingAttachments,
              }),
            });
            pendingReply = null;
            await loadState();
            return;
          }

          const response = await fetch("/api/chat/stream", {
            method: "POST",
            credentials: "include",
            headers: { "Content-Type": "application/json" },
            signal: abortController.signal,
            body: JSON.stringify({
              chat_id: chat.id,
              message: originalMessage,
              model_id,
              mask_id: agent_id,
              reasoning_effort: reasoning_effort || null,
              attachments: outgoingAttachments,
            }),
          });
          if (!response.ok) {
            const text = await response.text();
            let messageText = text || "request failed";
            try {
              const payload = JSON.parse(text);
              if (typeof payload?.detail === "string" && payload.detail.trim()) {
                messageText = payload.detail;
              } else if (
                typeof payload?.error?.message === "string" &&
                payload.error.message.trim()
              ) {
                messageText = payload.error.message;
              }
            } catch (_) {}
            throw new Error(messageText);
          }

          if (!response.body) {
            throw new Error("流式响应读取失败");
          }

          const reader = response.body.getReader();
          const decoder = new TextDecoder("utf-8");
          let buffer = "";

          const processSseBlock = (block) => {
            if (!block) return;
            const dataText = block
              .split("\n")
              .map((line) => line.trim())
              .filter((line) => line.startsWith("data:"))
              .map((line) => line.slice(5).trim())
              .join("\n");
            if (!dataText) return;
            let payload = null;
            try {
              payload = JSON.parse(dataText);
            } catch (_) {
              return;
            }
            if (payload.type === "delta") {
              if (!pendingReply || pendingReply.chatId !== chat.id) return;
              if (pendingReply.mode !== "typing") {
                pendingReply.mode = "typing";
                pendingReply.content = "";
                renderMessages();
              }
              pendingReply.content += String(payload.delta || "");
              updatePendingReplyDom();
              return;
            }
            if (payload.type === "error") {
              throw new Error(payload.error || "流式请求失败");
            }
          };

          while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const blocks = buffer.split("\n\n");
            buffer = blocks.pop() || "";
            for (const block of blocks) {
              processSseBlock(block.trim());
            }
          }
          if (buffer.trim()) {
            processSseBlock(buffer.trim());
          }
          pendingReply = null;
          await loadState();
        } catch (e) {
          if (e?.name === "AbortError") {
            abortedByUser = true;
            errorEl.textContent = "";
            pendingReply = null;
            await loadState();
          } else {
            errorEl.textContent = "发送失败：" + e.message;
            messageInput.value = originalMessage;
            pendingAttachments = originalPendingAttachments;
            renderComposeAttachments();
            pendingReply = null;
            await loadState();
          }
        } finally {
          streamAbortController = null;
          stopTypingAnimation();
          pendingReply = null;
          renderMessages();
          setSending(false);
          if (abortedByUser) {
            errorEl.textContent = "";
          }
        }
      }

      document.getElementById("messageText").addEventListener("keydown", (e) => {
        if (e.key !== "Enter") return;
        if (e.altKey) {
          e.preventDefault();
          insertTextAtCursor(e.target, "\n");
          return;
        }
        if (!e.isComposing) {
          e.preventDefault();
          sendMessage();
        }
      });

      document.getElementById("messageText").addEventListener("paste", async (e) => {
        const items = Array.from(e.clipboardData?.items || []);
        const files = items
          .filter((item) => item.kind === "file")
          .map((item) => item.getAsFile())
          .filter(Boolean);
        if (!files.length) return;
        e.preventDefault();
        await addFilesToPending(files);
      });

      document.getElementById("filePicker").addEventListener("change", async (e) => {
        await addFilesToPending(e.target.files || []);
        e.target.value = "";
      });

      document.getElementById("chatSearchInput").addEventListener("input", (e) => {
        const nextQuery = e.target.value || "";
        if (chatSearchTimer) {
          window.clearTimeout(chatSearchTimer);
        }
        chatSearchTimer = window.setTimeout(() => {
          applyChatSearch(nextQuery);
          chatSearchTimer = null;
        }, CHAT_SEARCH_DEBOUNCE_MS);
      });

      document.getElementById("chatSearchInput").addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          jumpToSearchResult(e.shiftKey ? -1 : 1);
          return;
        }
        if (e.key === "Escape") {
          e.preventDefault();
          clearChatSearch();
        }
      });

      document.getElementById("chatModel").addEventListener("change", () => {
        saveCurrentChatConfig();
      });

      document.getElementById("chatAgent").addEventListener("change", () => {
        saveCurrentChatConfig();
      });

      document.getElementById("chatReasoning").addEventListener("change", () => {
        saveCurrentChatConfig();
      });

      document.addEventListener("selectionchange", () => {
        if (!pendingReply?.deferRender) return;
        if (!hasActiveMessageSelection()) {
          updatePendingReplyDom();
        }
      });

      document.getElementById("username").addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          login();
        }
      });

      document.getElementById("password").addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          login();
        }
      });

      ["setupAppTitle", "setupAppSubtitle", "setupAdminPassword", "setupAdminPasswordConfirm", "setupModelName", "setupModelUrl", "setupModelKey"].forEach(
        (id) => {
          const el = document.getElementById(id);
          if (!el) return;
          el.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
              e.preventDefault();
              initApp();
            }
          });
        },
      );

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && imagePreviewOpen) {
          e.preventDefault();
          closeImagePreview();
          return;
        }
        if (e.key === "Escape" && confirmResolver) {
          e.preventDefault();
          closeConfirmDialog(false);
        }
      });

      document.addEventListener("click", (e) => {
        const target = e.target;
        if (!(target instanceof HTMLElement)) return;
        if (target.matches("[data-copy-code]")) {
          copyCodeFromBlock(target);
        }
      });

      initTheme();
      initFontSettings();
      renderComposeAttachments();
      initMessageScrollTracking();
      checkAuth();
    </script>
  </body>
</html>
