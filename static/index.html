<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Chat</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
      :root {
        --white: #ffffff;
        --black: #2f2f2f;
        --gray: #f7fbff;
        --primary: #1d93ab;
        --second: #e9f8ff;
        --hover: #f3f8fb;
        --bar: rgba(0, 0, 0, 0.1);
        --border: 1px solid #e2e8ee;
        --shadow: 0 24px 80px rgba(17, 24, 39, 0.12);
        --card-shadow: 0 2px 8px rgba(17, 24, 39, 0.06);
        --sidebar-width: 300px;
        --ui-font-family: "Noto Sans", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
        --chat-font-family: "Noto Sans", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
        --ui-font-size: 14px;
        --chat-font-size: 14px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        font-family: var(--ui-font-family);
        font-size: var(--ui-font-size);
        background: radial-gradient(circle at 0% 0%, #eef9ff 0%, #f8fbfd 45%, #f3f7fb 100%);
        color: var(--black);
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      .auth-screen {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .auth-card {
        width: min(460px, 100%);
        background: var(--white);
        border: var(--border);
        border-radius: 20px;
        box-shadow: var(--shadow);
        padding: 24px;
      }

      .auth-title {
        margin: 0;
        font-size: 22px;
        font-weight: 700;
      }

      .auth-subtitle {
        margin: 8px 0 0;
        font-size: 13px;
        color: #5b6b78;
      }

      .auth-card input {
        width: 100%;
        margin-top: 16px;
        border: var(--border);
        background: #f9fcff;
        border-radius: 12px;
        min-height: 42px;
        padding: 0 12px;
      }

      .auth-card button {
        width: 100%;
        margin-top: 12px;
      }

      .auth-error {
        margin-top: 10px;
        min-height: 20px;
        font-size: 13px;
        color: #c02626;
      }

      #appShell {
        width: 100vw;
        height: 100vh;
        margin: 0;
        border: none;
        border-radius: 0;
        box-shadow: none;
        background: var(--white);
        overflow: hidden;
        display: none;
        position: relative;
      }

      .sidebar {
        width: var(--sidebar-width);
        height: 100%;
        border-right: var(--border);
        background: var(--second);
        display: flex;
        flex-direction: column;
        padding: 18px;
        gap: 12px;
      }

      .sidebar-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 10px;
        padding-top: 8px;
      }

      .sidebar-title {
        font-size: calc(var(--ui-font-size) + 6px);
        font-weight: 700;
      }

      .sidebar-subtitle {
        margin-top: 4px;
        font-size: calc(var(--ui-font-size) - 2px);
        color: #5b6b78;
      }

      .sidebar-actions {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .sidebar-search {
        display: flex;
        align-items: center;
        gap: 6px;
        min-height: 36px;
        padding: 0 8px;
        border: var(--border);
        border-radius: 12px;
        background: var(--white);
        color: #6f8395;
      }

      .sidebar-search svg {
        width: 14px;
        height: 14px;
        stroke: currentColor;
        stroke-width: 1.9;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
        flex-shrink: 0;
      }

      .sidebar-search-input {
        flex: 1;
        min-width: 0;
        border: none;
        outline: none;
        background: transparent;
        color: var(--black);
        font-size: calc(var(--ui-font-size) - 1px);
      }

      .sidebar-search-input::placeholder {
        color: #7a8d9d;
      }

      .sidebar-search-tools {
        display: none;
        align-items: center;
        gap: 6px;
      }

      .sidebar-search-tools.show {
        display: inline-flex;
      }

      .sidebar-search-counter {
        min-width: 34px;
        text-align: center;
        font-size: 11px;
        color: #758a9b;
        user-select: none;
      }

      .sidebar-search-nav-btn {
        min-height: 22px;
        width: 22px;
        height: 22px;
        padding: 0;
        border-radius: 7px;
        border: 1px solid transparent;
        background: transparent;
        color: #708496;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .sidebar-search-nav-btn svg {
        width: 12px;
        height: 12px;
      }

      .sidebar-search-nav-btn:hover {
        background: rgba(29, 147, 171, 0.12);
        border-color: rgba(29, 147, 171, 0.38);
        color: #0e6f86;
      }

      .sidebar-search-nav-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .sidebar-search-clear {
        min-height: 22px;
        width: 22px;
        height: 22px;
        padding: 0;
        border-radius: 7px;
        border: 1px solid transparent;
        background: transparent;
        color: #708496;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .sidebar-search-clear:hover {
        background: rgba(29, 147, 171, 0.12);
        border-color: rgba(29, 147, 171, 0.38);
        color: #0e6f86;
      }

      .sidebar-search-clear svg {
        width: 12px;
        height: 12px;
      }

      .chat-list {
        flex: 1;
        overflow: auto;
        padding-right: 2px;
      }

      .chat-item {
        border: 2px solid transparent;
        border-radius: 12px;
        padding: 8px 10px;
        padding-right: 50px;
        padding-bottom: 10px;
        min-height: 77px;
        background: var(--white);
        box-shadow: var(--card-shadow);
        margin-bottom: 8px;
        cursor: pointer;
        transition: all 0.18s ease;
        position: relative;
      }

      .chat-item:hover {
        background: #fafdff;
      }

      .chat-item.selected {
        border-color: var(--primary);
      }

      .chat-item-title {
        font-size: var(--ui-font-size);
        font-weight: 700;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .chat-item-foot {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 6px;
        font-size: calc(var(--ui-font-size) - 2px);
        color: #6d7c89;
      }

      .chat-item-corner-actions {
        position: absolute;
        right: 7px;
        top: 7px;
        width: 18px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        gap: 3px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.15s ease;
      }

      .chat-item-delete,
      .chat-item-outline,
      .chat-item-export {
        min-height: 18px;
        width: 18px;
        height: 18px;
        padding: 0;
        border: 1px solid transparent;
        border-radius: 4px;
        background: transparent;
        color: #6c8293;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease,
          transform 0.12s ease;
      }

      .chat-item-delete svg {
        width: 10px;
        height: 10px;
      }

      .chat-item:hover .chat-item-corner-actions,
      .chat-item.selected .chat-item-corner-actions {
        opacity: 1;
        pointer-events: auto;
      }

      .chat-item-delete:hover {
        background: rgba(29, 147, 171, 0.12);
        border-color: rgba(29, 147, 171, 0.38);
        color: #0e6f86;
      }

      .chat-item-delete:active {
        transform: scale(0.96);
      }

      .chat-item-delete:focus-visible {
        outline: 2px solid rgba(29, 147, 171, 0.45);
        outline-offset: 1px;
      }

      .chat-item-delete svg path {
        stroke: currentColor;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .chat-item-delete {
        cursor: pointer;
      }

      body.theme-dark .chat-item-delete {
        color: #95a8b9;
      }

      body.theme-dark .chat-item-delete:hover {
        background: rgba(74, 150, 196, 0.2);
        border-color: rgba(110, 169, 205, 0.5);
        color: #b7e8ff;
      }

      .chat-item-outline svg {
        width: 10px;
        height: 10px;
      }

      .chat-item-outline svg path {
        stroke: currentColor;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .chat-item-export svg {
        width: 10px;
        height: 10px;
      }

      .chat-item-export svg path {
        stroke: currentColor;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .chat-item-outline:hover {
        background: rgba(29, 147, 171, 0.12);
        border-color: rgba(29, 147, 171, 0.38);
        color: #0e6f86;
      }

      .chat-item-delete *,
      .chat-item-outline *,
      .chat-item-export * {
        pointer-events: none;
      }

      .chat-item-export:hover {
        background: rgba(29, 147, 171, 0.12);
        border-color: rgba(29, 147, 171, 0.38);
        color: #0e6f86;
      }

      .chat-item-delete:active,
      .chat-item-outline:active,
      .chat-item-export:active {
        transform: scale(0.96);
      }

      body.theme-dark .chat-item-outline {
        color: #95a8b9;
      }

      body.theme-dark .chat-item-export {
        color: #95a8b9;
      }

      body.theme-dark .chat-item-outline:hover {
        background: rgba(74, 150, 196, 0.2);
        border-color: rgba(110, 169, 205, 0.5);
        color: #b7e8ff;
      }

      body.theme-dark .chat-item-export:hover {
        background: rgba(74, 150, 196, 0.2);
        border-color: rgba(110, 169, 205, 0.5);
        color: #b7e8ff;
      }

      .sidebar-tail {
        border-top: var(--border);
        padding-top: 10px;
      }

      .main {
        position: absolute;
        inset: 0 0 0 var(--sidebar-width);
        display: flex;
        flex-direction: column;
        background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
      }

      .window-header {
        border-bottom: var(--border);
        padding: 14px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: 72px;
      }

      .window-header-left {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .window-main-title {
        font-size: calc(var(--ui-font-size) + 6px);
        font-weight: 700;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: min(420px, 48vw);
      }

      .window-sub-title {
        margin-top: 2px;
        font-size: calc(var(--ui-font-size) - 2px);
        color: #607280;
      }

      .window-actions {
        display: flex;
        gap: 8px;
      }

      .chat-body {
        flex: 1;
        overflow: auto;
        padding: 18px 16px 24px;
      }

      .empty-state {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #7a8792;
        text-align: center;
      }

      .empty-state button {
        margin-top: 14px;
      }

      .message-row {
        display: flex;
        gap: 10px;
        margin-top: 14px;
        animation: fadeUp 0.18s ease;
      }

      .message-row.user {
        flex-direction: row-reverse;
      }

      .message-avatar {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
        border: var(--border);
        color: #355265;
        background: #eff5f9;
        flex: none;
        margin-top: 1px;
      }

      .message-row.user .message-avatar {
        background: #dff5ff;
      }

      .message-content {
        max-width: min(760px, calc(100% - 56px));
        display: flex;
        flex-direction: column;
      }

      .message-row.user .message-content {
        align-items: flex-end;
      }

      .message-meta {
        font-family: var(--chat-font-family);
        font-size: calc(var(--chat-font-size) - 2px);
        color: #70818e;
        margin-bottom: 4px;
      }

      .message-bubble {
        border: var(--border);
        border-radius: 14px;
        padding: 10px 12px;
        line-height: 1.55;
        font-family: var(--chat-font-family);
        font-size: var(--chat-font-size);
        white-space: normal;
        word-break: break-word;
        background: #f8fbfd;
      }

      .message-bubble-with-actions {
        position: relative;
        padding-right: 68px;
        padding-bottom: 38px;
      }

      .message-bubble-main {
        min-height: 18px;
      }

      .message-action-row {
        margin-top: 0;
        position: absolute;
        right: 8px;
        bottom: 8px;
        display: inline-flex;
        justify-content: flex-end;
        gap: 6px;
        min-height: 0;
      }

      .message-action-btn {
        min-height: 24px;
        width: 24px;
        height: 24px;
        padding: 0;
        border-radius: 7px;
        border: 1px solid #c8d8e7;
        background: #f2f8fc;
        color: #3c5b6e;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .message-action-btn svg {
        width: 13px;
        height: 13px;
      }

      .message-action-btn svg path {
        stroke: currentColor;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .message-action-btn:hover {
        background: rgba(29, 147, 171, 0.12);
        border-color: rgba(29, 147, 171, 0.38);
        color: #0e6f86;
      }

      .message-action-btn.is-copied {
        background: rgba(29, 147, 171, 0.18);
        border-color: rgba(29, 147, 171, 0.45);
        color: #0e6f86;
      }

      .message-action-btn * {
        pointer-events: none;
      }

      .message-row.user .message-bubble {
        background: var(--second);
      }

      .typing-indicator {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: #5d7385;
        font-size: 13px;
      }

      .typing-dots {
        display: inline-flex;
        gap: 4px;
      }

      .typing-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #5e7f94;
        opacity: 0.35;
        animation: typingPulse 1s infinite ease-in-out;
      }

      .typing-dot:nth-child(2) {
        animation-delay: 0.18s;
      }

      .typing-dot:nth-child(3) {
        animation-delay: 0.36s;
      }

      .typing-stream {
        display: inline-flex;
        align-items: flex-end;
        gap: 4px;
        width: 100%;
        color: #2f4a5c;
      }

      .pending-stream-render {
        flex: 1;
        min-width: 0;
      }

      .pending-stream-render .markdown-content {
        margin: 0;
      }

      .pending-stream-render .streaming-tail {
        font-family: var(--chat-font-family);
        white-space: pre-wrap;
        word-break: break-word;
        color: inherit;
      }

      .typing-cursor {
        width: 7px;
        height: 1.05em;
        background: #5e7f94;
        border-radius: 2px;
        animation: cursorBlink 1s infinite;
      }

      body.theme-dark .typing-stream {
        color: #dce6ef;
      }

      .message-jump-highlight .message-bubble {
        box-shadow: 0 0 0 2px rgba(29, 147, 171, 0.35);
        animation: jumpFlash 1.2s ease;
      }

      .message-row.search-hit-active .message-bubble {
        box-shadow: 0 0 0 2px rgba(29, 147, 171, 0.35);
      }

      .search-highlight {
        color: inherit;
        border-radius: 4px;
        padding: 0 1px;
        background: rgb(237 78 11);
      }

      .search-highlight-active {
        background: rgb(237 78 11);
        box-shadow: 0 0 0 6px rgb(255 0 0 / 42%);
      }

      .markdown-content {
        font-size: var(--chat-font-size);
        font-family: var(--chat-font-family);
      }

      .markdown-content p {
        margin: 0 0 10px;
      }

      .markdown-content p:last-child {
        margin-bottom: 0;
      }

      .inline-code {
        font-family: "Cascadia Mono", Consolas, "Courier New", monospace;
        font-size: 0.92em;
        background: #d9ecfb;
        border: 1px solid #b9d9f2;
        color: #10364f;
        border-radius: 6px;
        padding: 2px 6px;
        font-weight: 600;
      }

      .markdown-content :not(pre) > code {
        font-family: "Cascadia Mono", Consolas, "Courier New", monospace;
        font-size: 0.92em;
        background: #d9ecfb;
        border: 1px solid #b9d9f2;
        color: #10364f;
        border-radius: 6px;
        padding: 2px 6px;
        font-weight: 600;
      }

      .code-block {
        border: 1px solid #d4dee8;
        border-radius: 12px;
        overflow: hidden;
        background: #f6f8fb;
        margin: 8px 0;
      }

      .code-block-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 8px 10px;
        border-bottom: 1px solid #dbe5ef;
        background: #eaf1f7;
      }

      .code-lang {
        font-size: 12px;
        font-weight: 700;
        color: #2d4a5f;
        text-transform: lowercase;
      }

      .code-copy-btn {
        min-height: 28px;
        padding: 0 10px;
        border-radius: 8px;
        border: 1px solid #c9d8e6;
        background: #ffffff;
        color: #2b475a;
        cursor: pointer;
        font-size: 12px;
      }

      .code-block pre {
        margin: 0;
        padding: 12px;
        overflow: auto;
        background: #0f1724 !important;
      }

      .code-block code {
        font-family: "Cascadia Mono", Consolas, "Courier New", monospace;
        font-size: 13px;
        line-height: 1.55;
        white-space: pre;
      }

      .cmd-keyword {
        color: #ff7b72;
        font-weight: 600;
      }

      .cmd-command {
        color: #79c0ff;
      }

      .cmd-prompt {
        color: #8b949e;
      }

      .cmd-flag {
        color: #a5d6ff;
      }

      .cmd-var {
        color: #d2a8ff;
      }

      .cmd-string {
        color: #a5d6a7;
      }

      .cmd-comment {
        color: #8b949e;
        font-style: italic;
      }

      .markdown-content h1,
      .markdown-content h2,
      .markdown-content h3,
      .markdown-content h4 {
        margin: 10px 0 8px;
        line-height: 1.3;
      }

      .markdown-content ul,
      .markdown-content ol {
        margin: 8px 0;
        padding-left: 22px;
      }

      .markdown-content li {
        margin: 4px 0;
      }

      .markdown-content blockquote {
        margin: 8px 0;
        padding: 6px 10px;
        border-left: 3px solid #8ac8dd;
        background: rgba(138, 200, 221, 0.12);
        border-radius: 6px;
      }

      .markdown-content a {
        color: #0e6f86;
        text-decoration: none;
      }

      .markdown-content a:hover {
        text-decoration: underline;
      }

      .markdown-content table {
        border-collapse: collapse;
        margin: 10px 0;
        width: 100%;
        font-size: 13px;
      }

      .markdown-content th,
      .markdown-content td {
        border: 1px solid #dbe5ef;
        padding: 6px 8px;
      }

      .chat-input-panel {
        border-top: var(--border);
        padding: 10px 10px 5px;
        box-shadow: 0 -2px 8px rgba(17, 24, 39, 0.03);
      }

      .chat-config-row {
        display: flex;
        gap: 8px;
        margin-bottom: 8px;
      }

      .chat-config-row select {
        flex: 1;
        border: var(--border);
        border-radius: 10px;
        height: 38px;
        padding: 0 10px;
        background: var(--white);
      }

      .chat-input-wrap {
        border: var(--border);
        border-radius: 12px;
        position: relative;
        background: #ffffff;
      }

      .chat-input {
        width: 100%;
        border: none;
        resize: vertical;
        min-height: 86px;
        max-height: 280px;
        padding: 12px 138px 12px 12px;
        border-radius: 12px;
        outline: none;
        font-family: var(--chat-font-family);
        font-size: var(--chat-font-size);
        color: var(--black);
        background: transparent;
      }

      .chat-input::placeholder {
        color: #6f7f8c;
      }

      .send-btn {
        position: absolute;
        right: 10px;
        bottom: 10px;
        width: 82px;
      }

      .attach-btn {
        position: absolute;
        right: 98px;
        bottom: 10px;
        min-width: 36px;
        width: 36px;
        height: 36px;
        border-radius: 10px;
        padding: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
      }

      .compose-attachments {
        display: flex;
        flex-wrap: wrap;

    <script>
      let state = null;
      let selectedChatId = null;
      let sending = false;
      let settingsTab = "general";

      let pendingReply = null;
      let typingTimer = null;
      let streamAbortController = null;
      let pendingAttachments = [];
      let currentTheme = "light";
      let editingAgentId = null;
      let authStatusCache = null;
      let messageIndexChatId = null;
      let confirmResolver = null;
      let imagePreviewOpen = false;
      let chatSearchQuery = "";
      let chatSearchTimer = null;
      let chatSearchIndex = new Map();
      let chatSearchMessageIndex = new Map();
      let chatSearchMessageResults = [];
      let chatSearchResultCursor = -1;
      let chatSearchActiveMessageKey = "";
      let chatSearchActiveResultKey = "";
      const CHAT_SEARCH_DEBOUNCE_MS = 180;
      const REASONING_EFFORT_OPTIONS = [
        { value: "", label: "推理等级" },
        { value: "low", label: "低" },
        { value: "medium", label: "中" },
        { value: "high", label: "高" },
        { value: "xhigh", label: "超高" },
      ];
      const AUTO_SCROLL_BOTTOM_THRESHOLD = 64;
      let shouldAutoScroll = true;
      let messageScrollListenerBound = false;
      const FONT_FAMILY_MAP = {
        noto: '"Noto Sans", "PingFang SC", "Helvetica Neue", Arial, sans-serif',
        system: '-apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif',
        pingfang: '"PingFang SC", "Helvetica Neue", Arial, sans-serif',
        yahei: '"Microsoft YaHei", "微软雅黑", "PingFang SC", Arial, sans-serif',
        sourcehan: '"Source Han Sans SC", "Noto Sans CJK SC", "PingFang SC", sans-serif',
        songti: '"Songti SC", "STSong", "SimSun", "宋体", serif',
        kaiti: '"Kaiti SC", "KaiTi", "楷体", "STKaiti", serif',
        serif: '"Noto Serif SC", "Songti SC", "Times New Roman", serif',
        mono: '"Cascadia Mono", "Consolas", "Menlo", monospace',
      };
      const DEFAULT_FONT_SETTINGS = {
        uiFamily: "noto",
        uiSize: 14,
        chatFamily: "noto",
        chatSize: 14,
      };
      let fontSettings = { ...DEFAULT_FONT_SETTINGS };

      async function api(path, options = {}) {
        const res = await fetch(path, {
          credentials: "include",
          headers: { "Content-Type": "application/json", ...(options.headers || {}) },
          ...options,
        });
        if (!res.ok) {
          const text = await res.text();
          let message = text || "request failed";
          try {
            const payload = JSON.parse(text);
            if (typeof payload?.detail === "string" && payload.detail.trim()) {
              message = payload.detail;
            } else if (
              typeof payload?.error?.message === "string" &&
              payload.error.message.trim()
            ) {
              message = payload.error.message;
            }
          } catch (_) {}
          throw new Error(message);
        }
        return res.json();
      }

      function escapeHtml(str) {
        return (str || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");
      }

      function escapeAttr(str) {
        return String(str || "")
          .replaceAll("&", "&amp;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");
      }

      function maskApiKeyForDisplay(apiKey) {
        const raw = String(apiKey || "").trim();
        if (!raw) return "(未配置 api_key)";
        if (raw.includes("*")) return raw;
        const n = raw.length;
        if (n <= 12) {
          return "*".repeat(n);
        }
        let keep = 0;
        if (n <= 17) keep = 2;
        else if (n <= 24) keep = 4;
        else keep = 6;
        const hiddenLen = Math.max(0, n - keep * 2);
        return `${raw.slice(0, keep)}${"*".repeat(hiddenLen)}${raw.slice(n - keep)}`;
      }

      function displayModelMaskedKey(model) {
        const backendMasked = String(model?.api_key_masked || "").trim();
        if (backendMasked) return backendMasked;
        return maskApiKeyForDisplay(model?.api_key || "");
      }

      function normalizeSearchText(value) {
        return String(value || "")
          .toLowerCase()
          .replace(/\s+/g, " ")
          .trim();
      }

      function normalizeReasoningEffort(value) {
        const effort = String(value || "")
          .trim()
          .toLowerCase();
        if (!effort) return "";
        return ["low", "medium", "high", "xhigh"].includes(effort) ? effort : "";
      }

      function buildAttachmentSearchText(att) {
        let text = `${att?.name || ""} `;
        if (typeof att?.text_content === "string" && att.text_content) {
          text += `${att.text_content.slice(0, 1800)} `;
        }
        return text;
      }

      function buildMessageSearchText(msg) {
        const MAX_SEARCH_CHARS_PER_MESSAGE = 5200;
        let text = `${msg?.content || ""} `;
        const attachments = Array.isArray(msg?.attachments) ? msg.attachments : [];
        for (const att of attachments) {
          if (text.length >= MAX_SEARCH_CHARS_PER_MESSAGE) break;
          text += buildAttachmentSearchText(att);
        }
        if (text.length > MAX_SEARCH_CHARS_PER_MESSAGE) {
          text = text.slice(0, MAX_SEARCH_CHARS_PER_MESSAGE);
        }
        return normalizeSearchText(text);
      }

      function buildChatSearchIndex() {
        const chats = Array.isArray(state?.chats) ? state.chats : [];
        const nextChatIndex = new Map();
        const nextMessageIndex = new Map();
        const MAX_SEARCH_CHARS_PER_CHAT = 26000;

        for (const chat of chats) {
          let raw = `${chat?.title || ""} `;
          const messages = Array.isArray(chat?.messages) ? chat.messages : [];

          for (let msgIdx = 0; msgIdx < messages.length; msgIdx += 1) {
            const msg = messages[msgIdx];
            const messageSearchText = buildMessageSearchText(msg);
            nextMessageIndex.set(`${chat.id}:${msgIdx}`, messageSearchText);
            if (raw.length >= MAX_SEARCH_CHARS_PER_CHAT) break;
            raw += `${messageSearchText} `;
          }

          if (raw.length > MAX_SEARCH_CHARS_PER_CHAT) {
            raw = raw.slice(0, MAX_SEARCH_CHARS_PER_CHAT);
          }
          nextChatIndex.set(chat.id, normalizeSearchText(raw));
        }

        chatSearchIndex = nextChatIndex;
        chatSearchMessageIndex = nextMessageIndex;
      }

      function collectMessageSearchResults(query) {
        const chats = Array.isArray(state?.chats) ? state.chats : [];
        if (!query) return [];
        const results = [];
        for (const chat of chats) {
          const messages = Array.isArray(chat?.messages) ? chat.messages : [];
          for (let msgIdx = 0; msgIdx < messages.length; msgIdx += 1) {
            const key = `${chat.id}:${msgIdx}`;
            const searchable = chatSearchMessageIndex.get(key) || "";
            const hitCount = countOccurrences(searchable, query);
            for (let occ = 0; occ < hitCount; occ += 1) {
              results.push({
                id: `${key}:${occ}`,
                key,
                chatId: chat.id,
                msgIndex: msgIdx,
                occurrence: occ,
              });
            }
          }
        }
        return results;
      }

      function refreshChatSearchResults() {
        const normalizedQuery = normalizeSearchText(chatSearchQuery);
        if (!normalizedQuery) {
          chatSearchMessageResults = [];
          chatSearchResultCursor = -1;
          chatSearchActiveMessageKey = "";
          chatSearchActiveResultKey = "";
          return;
        }
        const nextResults = collectMessageSearchResults(normalizedQuery);
        let nextCursor = -1;
        if (chatSearchActiveResultKey) {
          nextCursor = nextResults.findIndex((item) => item.id === chatSearchActiveResultKey);
        }
        if (nextCursor < 0 && nextResults.length) {
          nextCursor = nextResults.findIndex((item) => item.chatId === selectedChatId);
        }
        if (nextCursor < 0 && nextResults.length) {
          nextCursor = 0;
        }
        chatSearchMessageResults = nextResults;
        chatSearchResultCursor = nextCursor;
        chatSearchActiveMessageKey = nextCursor >= 0 ? nextResults[nextCursor].key : "";
        chatSearchActiveResultKey = nextCursor >= 0 ? nextResults[nextCursor].id : "";
      }

      function updateChatSearchClearButton() {
        const clearBtn = document.getElementById("chatSearchClearBtn");
        if (!clearBtn) return;
        clearBtn.disabled = !Boolean(normalizeSearchText(chatSearchQuery));
      }

      function updateChatSearchNavigator() {
        const total = chatSearchMessageResults.length;
        const toolsEl = document.getElementById("chatSearchTools");
        const prevBtn = document.getElementById("chatSearchPrevBtn");
        const nextBtn = document.getElementById("chatSearchNextBtn");
        const counterEl = document.getElementById("chatSearchCounter");
        const hasResults = total > 0;
        if (toolsEl) toolsEl.classList.toggle("show", hasResults);
        if (prevBtn) prevBtn.disabled = !hasResults;
        if (nextBtn) nextBtn.disabled = !hasResults;
        if (counterEl) {
          if (hasResults) {
            const cursor = Math.max(0, chatSearchResultCursor);
            counterEl.textContent = `${cursor + 1}/${total}`;
          } else {

      function getFilteredChats() {
        const chats = Array.isArray(state?.chats) ? state.chats : [];

      function getSearchHighlightTerms() {
        const normalized = normalizeSearchText(chatSearchQuery);
        if (!normalized) return [];
        return [normalized];

      function countOccurrences(text, query) {
        const haystack = String(text || "");
        const needle = String(query || "");
        if (!haystack || !needle) return 0;
        let count = 0;
        let from = 0;
        while (from <= haystack.length) {
          const hit = haystack.indexOf(needle, from);
          if (hit < 0) break;
          count += 1;
          from = hit + needle.length;
        }
        return count;
      }

      function clearSearchHighlights(root) {
        if (!root) return;
        const marks = root.querySelectorAll("span.search-highlight");
        marks.forEach((mark) => {
          const parent = mark.parentNode;
          if (!parent) return;
          parent.replaceChild(document.createTextNode(mark.textContent || ""), mark);
          parent.normalize();
        });
      }

      function applySearchHighlightTerm(container, term) {
        if (!container || !term) return;
        const needle = String(term).toLocaleLowerCase();
        if (!needle) return;
        const walker = document.createTreeWalker(
          container,
          NodeFilter.SHOW_TEXT,
          {
            acceptNode(node) {
              const text = String(node?.nodeValue || "");
              if (!text.trim()) return NodeFilter.FILTER_REJECT;
              const parent = node.parentElement;
              if (!parent) return NodeFilter.FILTER_REJECT;
              if (
                parent.closest(
                  "span.search-highlight, pre, code, .code-block-head, button, script, style, textarea",
                )
              ) {
                return NodeFilter.FILTER_REJECT;
              }
              if (!text.toLocaleLowerCase().includes(needle)) {
                return NodeFilter.FILTER_REJECT;
              }
              return NodeFilter.FILTER_ACCEPT;
            },
          },
          false,
        );
        const textNodes = [];
        while (walker.nextNode()) {
          textNodes.push(walker.currentNode);
        }
        textNodes.forEach((node) => {
          const raw = String(node.nodeValue || "");
          const lower = raw.toLocaleLowerCase();
          let from = 0;
          const frag = document.createDocumentFragment();
          let found = false;
          while (from < raw.length) {
            const hit = lower.indexOf(needle, from);
            if (hit < 0) break;
            if (hit > from) {
              frag.appendChild(document.createTextNode(raw.slice(from, hit)));
            }
            const mark = document.createElement("span");
            mark.className = "search-highlight";
            mark.textContent = raw.slice(hit, hit + needle.length);
            frag.appendChild(mark);
            from = hit + needle.length;
            found = true;
          }
          if (!found) return;
          if (from < raw.length) {
            frag.appendChild(document.createTextNode(raw.slice(from)));
          }
          node.parentNode?.replaceChild(frag, node);
        });
      }

      function applySearchHighlights(root) {
        if (!root) return;
        clearSearchHighlights(root);
        const terms = getSearchHighlightTerms();
        if (!terms.length) return;
        const containers = root.querySelectorAll(".message-bubble-main");
        containers.forEach((container) => {
          terms.forEach((term) => applySearchHighlightTerm(container, term));
        });
      }

      function formatBytes(bytes) {
        const size = Number(bytes || 0);
        if (!Number.isFinite(size) || size <= 0) return "0 B";
        const units = ["B", "KB", "MB", "GB"];
        let idx = 0;
        let value = size;
        while (value >= 1024 && idx < units.length - 1) {
          value /= 1024;
          idx += 1;
        }
        return `${value >= 10 || idx === 0 ? value.toFixed(0) : value.toFixed(1)} ${units[idx]}`;
      }

      function makeAttachmentId() {
        return `att-${Date.now()}-${Math.random().toString(16).slice(2, 8)}`;
      }

      function fileToDataURL(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result || ""));
          reader.onerror = () => reject(new Error("文件读取失败"));
          reader.readAsDataURL(file);
        });
      }

      async function buildAttachmentFromFile(file) {
        const MAX_FILE_SIZE = 6 * 1024 * 1024;
        if (!file) return null;
        if (file.size > MAX_FILE_SIZE) {
          throw new Error(`文件 ${file.name} 超过 6MB，暂不支持`);
        }
        const base = {
          id: makeAttachmentId(),
          name: file.name || "attachment",
          mime_type: file.type || "application/octet-stream",
          size: file.size || 0,
          kind: "file",
        };
        if ((file.type || "").toLowerCase().startsWith("image/")) {
          const dataUrl = await fileToDataURL(file);
          return { ...base, kind: "image", data_url: dataUrl };
        }
        try {
          const text = await file.text();
          return { ...base, kind: "text", text_content: String(text || "").slice(0, 20000) };
        } catch (_) {
          return base;
        }
      }

      function renderComposeAttachments() {
        const el = document.getElementById("composeAttachments");
        if (!el) return;
        if (!pendingAttachments.length) {

        el.innerHTML = pendingAttachments

            return `

                <span class="compose-attachment-text">${escapeHtml(label)}</span>
                <button class="compose-attachment-remove" type="button" onclick="removeAttachment('${att.id}')">脳</button>
              </span>
            `;
          })
          .join("");
      }

      async function addFilesToPending(fileList) {
        const files = Array.from(fileList || []);

          try {
            const att = await buildAttachmentFromFile(file);
            if (!att) continue;
            pendingAttachments.push(att);
          } catch (e) {
            if (errorEl) errorEl.textContent = e.message || "附件处理失败";
          }
        }
        pendingAttachments = pendingAttachments.slice(0, 8);
        renderComposeAttachments();

      function normalizeFontSettings(raw) {
        const next = { ...DEFAULT_FONT_SETTINGS, ...(raw || {}) };

        if (!FONT_FAMILY_MAP[next.chatFamily]) next.chatFamily = DEFAULT_FONT_SETTINGS.chatFamily;

          ? Math.max(6, Math.min(36, Math.round(Number(next.uiSize))))

        next.chatSize = Number.isFinite(Number(next.chatSize))

      function resolveCodeLanguage(lang) {
        const raw = String(lang || "").trim().toLowerCase();
        if (!raw) return { display: "text", hljs: "plaintext" };
        if (["shell", "sh", "zsh", "fish"].includes(raw)) return { display: "shell", hljs: "bash" };
        if (["bash"].includes(raw)) return { display: "bash", hljs: "bash" };
        if (["cmd", "bat", "batch", "dos"].includes(raw)) return { display: "cmd", hljs: "dos" };
        if (["powershell", "pwsh", "ps1", "ps"].includes(raw)) {
          return { display: "powershell", hljs: "powershell" };
        }
        return { display: raw, hljs: raw };
      }

      function looksLikeCommandLine(line) {
        const text = (line || "").trim();
        if (!text) return true;
        if (/[\u4e00-\u9fff]/.test(text)) return false;
        if (/^[$#]\s+.+/.test(text)) return true;
        if (/^[A-Za-z]:\\.*>\s*.+/.test(text)) return true;
        if (/^PS\s+[^>]+>\s*.+/.test(text)) return true;
        if (
          /^(sudo|apt|yum|dnf|brew|pip|python|node|npm|pnpm|yarn|git|docker|kubectl|ssh|scp|ls|cd|cp|mv|rm|cat|grep|find|chmod|chown|systemctl|service|curl|wget|echo|export|set|dir|copy|del|cls|ipconfig|tasklist|netstat|ping|tracert|wmic|choco|winget)\b/i.test(
            text,
          )
        ) {
          return true;
        }
        return false;
      }

      function guessCommandLanguage(lines) {
        const text = (lines || []).join("\n");
        if (/^PS\s+[^>]+>\s*/im.test(text) || /\$env:/i.test(text)) return "powershell";
        if (/^[A-Za-z]:\\.*>\s*/im.test(text)) return "cmd";
        if (/^(dir|copy|del|cls|ipconfig|tasklist|wmic|netstat)\b/im.test(text)) return "cmd";
        return "bash";
      }

      function renderCodeBlock(code, lang) {
        const safeCode = escapeHtml(code || "");
        const langMeta = resolveCodeLanguage(lang);
        const safeDisplayLang = escapeHtml(langMeta.display);
        const safeHljsLang = escapeHtml(langMeta.hljs);
        return `
          <div class="code-block" data-lang="${safeDisplayLang}" data-hljs-lang="${safeHljsLang}">
            <div class="code-block-head">
              <span class="code-lang">${safeDisplayLang}</span>
              <button class="code-copy-btn" data-copy-code>复制</button>
            </div>
            <pre><code class="language-${safeHljsLang}">${safeCode}</code></pre>
          </div>
        `;
      }

      function wrapPlainCommandParagraphs(text) {
        const parts = (text || "").split(/\n{2,}/);
        return parts
          .map((part) => {
            if (!part || !part.trim()) return "";
            const lines = part.split("\n");
            if (lines.every((line) => looksLikeCommandLine(line))) {
              const lang = guessCommandLanguage(lines);
              return `\`\`\`${lang}\n${part.trimEnd()}\n\`\`\``;
            }
            return part;
          })
          .join("\n\n");
      }

      function preprocessMarkdownContent(text) {
        const source = String(text || "");
        const regex = /```[\s\S]*?```/g;
        let last = 0;
        const chunks = [];
        let match = null;
        while ((match = regex.exec(source)) !== null) {
          const plain = source.slice(last, match.index);
          if (plain) chunks.push(wrapPlainCommandParagraphs(plain));
          chunks.push(match[0]);
          last = regex.lastIndex;
        }
        const tail = source.slice(last);
        if (tail) chunks.push(wrapPlainCommandParagraphs(tail));
        return chunks.join("");
      }

      function getMarkdownRenderer() {
        if (!window.marked) return null;
        if (markdownRenderer) return markdownRenderer;
        const renderer = new window.marked.Renderer();
        renderer.code = function (code, infostring) {
          return renderCodeBlock(code, infostring || "");
        };
        renderer.link = function (href, title, text) {
          const safeHref = escapeHtml(href || "");
          const safeTitle = title ? ` title="${escapeHtml(title)}"` : "";
          return `<a href="${safeHref}" target="_blank" rel="noreferrer noopener"${safeTitle}>${text}</a>`;
        };
        window.marked.setOptions({
          gfm: true,
          breaks: true,
          mangle: false,
          headerIds: false,
        });
        markdownRenderer = renderer;
        return markdownRenderer;
      }

      function renderMessageContent(text) {
        const source = preprocessMarkdownContent(text);
        const renderer = getMarkdownRenderer();
        if (!renderer || !window.marked) {
          return `<div class="markdown-content"><p>${escapeHtml(source).replace(/\n/g, "<br>")}</p></div>`;
        }
        const rawHtml = window.marked.parse(source, { renderer });
        const safeHtml = window.DOMPurify
          ? window.DOMPurify.sanitize(rawHtml, {
              ADD_ATTR: ["target", "rel", "class", "data-lang", "data-copy-code"],
            })
          : rawHtml;
        return `<div class="markdown-content">${safeHtml}</div>`;
      }

      function renderMessageAttachments(attachments) {
        const list = Array.isArray(attachments) ? attachments : [];
        if (!list.length) return "";
        const html = list
          .map((att) => {
            const name = escapeHtml(String(att?.name || "attachment"));
            const mime = escapeHtml(String(att?.mime_type || "application/octet-stream"));
            const size = formatBytes(Number(att?.size || 0));
            const kind = String(att?.kind || "file");
            const dataUrl = String(att?.data_url || "");
            const textContent = String(att?.text_content || "");
            if (kind === "image" && isImageAttachmentSource(dataUrl)) {
              return `
                <div class="message-attachment-card">
                  <div class="message-attachment-meta">图片附件: ${name} · ${size}</div>
                  <img class="message-attachment-image" src="${escapeAttr(dataUrl)}" alt="${escapeAttr(name)}" loading="lazy" style="cursor: zoom-in;" onclick="openImagePreview(this.src, '${escapeAttr(name)}')" />
                </div>
              `;
            }
            if (textContent) {
              return `
                <div class="message-attachment-card">
                  <div class="message-attachment-meta">文本附件: ${name} · ${mime} · ${size}</div>
                  <div class="message-attachment-meta">已提取文本用于分析（正文已隐藏）</div>
                </div>
              `;
            }
            return `
              <div class="message-attachment-card">
                <div class="message-attachment-meta">文件附件: ${name} · ${mime} · ${size}</div>
              </div>
            `;
          })
          .join("");
        return `<div class="message-attachments">${html}</div>`;
      }

      function getChatById(chatId) {
        return (state?.chats || []).find((c) => c.id === chatId) || null;
      }

      function getMessageByIndex(chatId, idx) {
        const chat = getChatById(chatId);
        if (!chat || !Array.isArray(chat.messages)) return null;
        if (idx < 0 || idx >= chat.messages.length) return null;
        return chat.messages[idx] || null;
      }

      function isImageAttachmentSource(dataUrl) {
        const value = String(dataUrl || "");
        return (
          value.startsWith("data:") ||
          value.startsWith("http://") ||
          value.startsWith("https://") ||
          value.startsWith("/data/file/")
        );
      }

      function attachmentHasImage(att) {
        return String(att?.kind || "") === "image" && isImageAttachmentSource(att?.data_url);
      }

      function messageHasImageAttachments(message) {
        const attachments = Array.isArray(message?.attachments) ? message.attachments : [];
        return attachments.some((att) => attachmentHasImage(att));
      }

      function chatHasImageAttachments(chat) {
        const messages = Array.isArray(chat?.messages) ? chat.messages : [];
        return messages.some((msg) => messageHasImageAttachments(msg));
      }

      function openImagePreview(src, altText = "图片预览") {

      function closeImagePreview() {

      function attachmentToPlainText(att) {
        const name = String(att?.name || "attachment");
        const mime = String(att?.mime_type || "application/octet-stream");
        const size = formatBytes(Number(att?.size || 0));
        if (att?.kind === "image") {
          return `[图片附件] ${name} (${mime}, ${size})`;
        }
        if (String(att?.text_content || "")) {
          return `[文本附件] ${name} (${mime}, ${size}) 已提取文本用于分析（正文已隐藏）`;
        }
        return `[文件附件] ${name} (${mime}, ${size})`;
      }

      function attachmentToMarkdown(att) {
        const name = String(att?.name || "attachment");
        const mime = String(att?.mime_type || "application/octet-stream");
        const size = formatBytes(Number(att?.size || 0));
        const dataUrl = String(att?.data_url || "");
        if (att?.kind === "image" && isImageAttachmentSource(dataUrl)) {
          return `![${name}](${dataUrl})`;
        }
        if (String(att?.text_content || "")) {
          return `- 文本附件: ${name} (${mime}, ${size})，已提取文本用于分析（正文已隐藏）`;
        }
        return `- 文件附件: ${name} (${mime}, ${size})`;
      }

      function messageToPlainText(message) {
        if (!message) return "";
        const base = String(message.content || "");
        const attachments = Array.isArray(message.attachments) ? message.attachments : [];
        if (!attachments.length) return base;
        const lines = attachments.map(attachmentToPlainText).join("\n\n");
        return base ? `${base}\n\n${lines}` : lines;
      }

      function messageToMarkdown(message) {
        if (!message) return "";
        const base = String(message.content || "");
        const attachments = Array.isArray(message.attachments) ? message.attachments : [];
        if (!attachments.length) return base;
        const blocks = attachments.map(attachmentToMarkdown).join("\n\n");
        return base ? `${base}\n\n${blocks}` : blocks;
      }

      function downloadTextFile(filename, content, mime = "text/plain;charset=utf-8") {
        const safeName = String(filename || "download.txt").replace(/[\\/:*?"<>|]+/g, "_");
        const blob = new Blob([content], { type: mime });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = safeName;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 500);
      }

      function downloadBlobFile(filename, blob) {
        const safeName = String(filename || "download.bin").replace(/[\\/:*?"<>|]+/g, "_");
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = safeName;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 800);
      }

      function sanitizeExportFileName(name, fallback = "file") {
        const cleaned = String(name || "")
          .trim()
          .replace(/[\\/:*?"<>|]+/g, "_")
          .replace(/\s+/g, " ");
        return cleaned || fallback;
      }

      function imageExtensionFromMime(mime) {
        const value = String(mime || "").toLowerCase();
        if (value === "image/jpeg") return "jpg";
        if (value === "image/png") return "png";
        if (value === "image/webp") return "webp";
        if (value === "image/gif") return "gif";
        if (value.startsWith("image/")) return value.split("/", 2)[1] || "png";
        return "png";
      }

      function buildUniqueImageFileName(att, index, usedNames) {
        const fallbackBase = `image-${index + 1}`;
        const rawName = sanitizeExportFileName(att?.name || "", fallbackBase);
        const extByNameMatch = rawName.match(/\.([a-zA-Z0-9]{2,8})$/);
        const extByName = extByNameMatch ? extByNameMatch[1].toLowerCase() : "";
        const ext = extByName || imageExtensionFromMime(att?.mime_type || "");
        const baseWithoutExt = extByName ? rawName.slice(0, -(extByName.length + 1)) : rawName;
        const safeBase = sanitizeExportFileName(baseWithoutExt, fallbackBase);
        let filename = `${safeBase}.${ext}`;
        let n = 2;
        while (usedNames.has(filename.toLowerCase())) {
          filename = `${safeBase}-${n}.${ext}`;
          n += 1;
        }
        usedNames.add(filename.toLowerCase());
        return filename;
      }

      async function fetchImageBlobForExport(dataUrl) {
        const src = String(dataUrl || "").trim();
        if (!src) {
          throw new Error("图片地址为空");
        }
        const res = await fetch(src, src.startsWith("data:") ? {} : { credentials: "same-origin" });
        if (!res.ok) {
          throw new Error(`图片下载失败 (${res.status})`);
        }
        return res.blob();
      }

      async function buildMessageMarkdownWithImages(
        message,
        imagesFolder,
        usedImageNames,
        imageBlobCache = new Map(),
      ) {
        if (!message) return "";
        const base = String(message.content || "");
        const attachments = Array.isArray(message.attachments) ? message.attachments : [];
        if (!attachments.length) return base;
        const blocks = [];
        let imageIndex = 0;
        for (const att of attachments) {
          if (attachmentHasImage(att)) {
            const src = String(att?.data_url || "");
            const cacheKey = src;
            let blobPromise = imageBlobCache.get(cacheKey);
            if (!blobPromise) {
              blobPromise = fetchImageBlobForExport(src);
              imageBlobCache.set(cacheKey, blobPromise);
            }
            try {
              const blob = await blobPromise;
              const imageFileName = buildUniqueImageFileName(att, imageIndex, usedImageNames);
              imagesFolder.file(imageFileName, blob);
              const altName = String(att?.name || imageFileName);
              blocks.push(`![${altName}](images/${imageFileName})`);
            } catch (_) {
              blocks.push(attachmentToMarkdown(att));
            }
            imageIndex += 1;
            continue;
          }
          blocks.push(attachmentToMarkdown(att));
        }
        const merged = blocks.join("\n\n");
        return base ? `${base}\n\n${merged}` : merged;
      }

      async function buildSingleMessageZipBlob(chat, message, idx) {
        if (typeof window.JSZip !== "function") {
          throw new Error("zip 导出组件未加载");
        }
        const zip = new window.JSZip();
        const imagesFolder = zip.folder("images");
        const usedImageNames = new Set();
        const markdownBody = await buildMessageMarkdownWithImages(
          message,
          imagesFolder,
          usedImageNames,
        );
        const roleName = message.role === "assistant" ? "assistant" : message.role === "user" ? "user" : "message";
        const chatTitle = sanitizeExportFileName(chat?.title || "chat", "chat");
        const mdFileName = `${chatTitle}-${idx + 1}-${roleName}.md`;
        zip.file(mdFileName, markdownBody || "");
        return zip.generateAsync({ type: "blob" });
      }

      async function buildChatZipBlob(chat) {
        if (typeof window.JSZip !== "function") {
          throw new Error("zip 导出组件未加载");
        }
        const zip = new window.JSZip();
        const imagesFolder = zip.folder("images");
        const usedImageNames = new Set();
        const imageBlobCache = new Map();
        const title = String(chat?.title || "新对话").trim() || "新对话";
        const lines = [`# ${title}`, ""];
        const messages = Array.isArray(chat?.messages) ? chat.messages : [];
        for (let idx = 0; idx < messages.length; idx += 1) {
          const msg = messages[idx];
          lines.push(`## ${idx + 1}. ${roleLabel(msg.role)}`);
          lines.push("");
          lines.push(
            await buildMessageMarkdownWithImages(
              msg,
              imagesFolder,
              usedImageNames,
              imageBlobCache,
            ),
          );
          lines.push("");
        }
        const safeTitle = sanitizeExportFileName(title, "chat");
        zip.file(`${safeTitle}.md`, lines.join("\n"));
        return zip.generateAsync({ type: "blob" });
      }

      function fallbackCopyText(text) {
        const value = String(text || "");
        if (!value) return false;
        const textarea = document.createElement("textarea");
        textarea.value = value;
        textarea.setAttribute("readonly", "readonly");
        textarea.style.position = "fixed";
        textarea.style.left = "-9999px";
        textarea.style.top = "0";
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();
        textarea.setSelectionRange(0, textarea.value.length);
        let ok = false;
        try {
          ok = document.execCommand("copy");
        } catch (_) {
          ok = false;
        } finally {
          textarea.remove();
        }
        return ok;
      }

      async function writeClipboardText(text) {
        const value = String(text || "");
        if (!value) return false;
        if (navigator.clipboard?.writeText) {
          try {
            await navigator.clipboard.writeText(value);
            return true;
          } catch (_) {}
        }
        return fallbackCopyText(value);
      }

      async function copyMessagePlainText(chatId, idx, buttonEl) {
        const message = getMessageByIndex(chatId, idx);
        if (!message) return;
        const text = messageToPlainText(message);
        if (!text) return;
        const copied = await writeClipboardText(text);
        if (!copied) {
          return;
        }
        if (buttonEl) {
          const originalTitle = buttonEl.getAttribute("title");
          const originalAria = buttonEl.getAttribute("aria-label");
          buttonEl.classList.add("is-copied");
          buttonEl.setAttribute("title", "已复制");
          buttonEl.setAttribute("aria-label", "已复制");
          setTimeout(() => {
            buttonEl.classList.remove("is-copied");
            if (originalTitle === null) buttonEl.removeAttribute("title");
            else buttonEl.setAttribute("title", originalTitle);
            if (originalAria === null) buttonEl.removeAttribute("aria-label");
            else buttonEl.setAttribute("aria-label", originalAria);
          }, 1000);
        }
      }

      async function downloadMessageMarkdown(chatId, idx) {
        const chat = getChatById(chatId);
        const message = getMessageByIndex(chatId, idx);
        if (!chat || !message) return;
        const roleName = message.role === "assistant" ? "assistant" : message.role === "user" ? "user" : "message";
        const title = String(chat.title || "chat").trim() || "chat";
        if (!messageHasImageAttachments(message)) {
          const body = messageToMarkdown(message);
          const filename = `${title}-${idx + 1}-${roleName}.md`;
          downloadTextFile(filename, body || "", "text/markdown;charset=utf-8");
          return;
        }
        try {
          const zipBlob = await buildSingleMessageZipBlob(chat, message, idx);
          const zipName = `${sanitizeExportFileName(title, "chat")}-${idx + 1}-${roleName}.zip`;
          downloadBlobFile(zipName, zipBlob);
        } catch (e) {
          const errText = e?.message ? String(e.message) : "打包下载失败";
          const errorEl = document.getElementById("sendError");
          if (errorEl) errorEl.textContent = `下载失败：${errText}`;
        }
      }

      function roleLabel(role) {
        if (role === "assistant") return "Assistant";

      function chatToMarkdown(chat) {

        const messages = Array.isArray(chat.messages) ? chat.messages : [];
        messages.forEach((msg, idx) => {

      function highlightCmdCode(text) {
        const cmdKeywords = new Set([
          "echo",
          "set",
          "if",
          "else",
          "for",
          "goto",
          "call",
          "pause",
          "hostname",
          "whoami",
          "ipconfig",
          "wmic",
          "dir",
          "cd",
          "copy",
          "del",
          "type",
          "findstr",
          "tasklist",
          "netstat",
          "ping",
          "tracert",
          "where",
          "cls",
          "start",
          "shutdown",
        ]);
        return String(text || "")
          .split("\n")
          .map((line) => {
            const raw = line || "";
            if (/^\s*(::|rem\b)/i.test(raw)) {
              return `<span class="cmd-comment">${escapeHtml(raw)}</span>`;
            }
            const match = raw.match(/^(\s*@?)([A-Za-z][\w.-]*)(.*)$/);
            if (!match) return escapeHtml(raw);
            const [, prefix, cmd, rest] = match;
            const safePrefix = escapeHtml(prefix);
            const safeCmd = cmdKeywords.has(cmd.toLowerCase())
              ? `<span class="cmd-keyword">${escapeHtml(cmd)}</span>`
              : `<span class="cmd-command">${escapeHtml(cmd)}</span>`;
            let safeRest = escapeHtml(rest);
            safeRest = safeRest.replace(/(%[^%\n]+%|![^!\n]+!)/g, "<span class=\"cmd-var\">$1</span>");
            safeRest = safeRest.replace(/(\"[^\"]*\")/g, "<span class=\"cmd-string\">$1</span>");
            safeRest = safeRest.replace(/(^|\s)(\/[A-Za-z0-9][\w-]*)/g, "$1<span class=\"cmd-flag\">$2</span>");
            return `${safePrefix}${safeCmd}${safeRest}`;
          })
          .join("\n");
      }

      function highlightShellCode(text) {
        return String(text || "")
          .split("\n")
          .map((line) => {
            const raw = line || "";
            if (!raw.trim()) return "";
            if (/^\s*#/.test(raw)) {
              return `<span class="cmd-comment">${escapeHtml(raw)}</span>`;
            }

            let rest = raw;
            let prompt = "";
            const promptMatch = rest.match(/^(\s*[$#]\s+)(.*)$/);
            if (promptMatch) {
              prompt = `<span class="cmd-prompt">${escapeHtml(promptMatch[1])}</span>`;
              rest = promptMatch[2];
            }

            const match = rest.match(/^(\s*)([A-Za-z0-9_.\/-]+)(.*)$/);
            if (!match) return `${prompt}${escapeHtml(rest)}`;
            const [, leading, cmd, tail] = match;
            let safeTail = escapeHtml(tail);
            safeTail = safeTail.replace(/(^|\s)(--?[A-Za-z0-9][\w-]*)/g, "$1<span class=\"cmd-flag\">$2</span>");
            safeTail = safeTail.replace(/(\$[A-Za-z_][A-Za-z0-9_]*|\$\{[^}\n]+\})/g, "<span class=\"cmd-var\">$1</span>");
            safeTail = safeTail.replace(/(\"[^\"]*\"|'[^']*')/g, "<span class=\"cmd-string\">$1</span>");
            return `${prompt}${escapeHtml(leading)}<span class="cmd-command">${escapeHtml(cmd)}</span>${safeTail}`;
          })
          .join("\n");
      }

      function highlightPowerShellCode(text) {
        return String(text || "")
          .split("\n")
          .map((line) => {
            const raw = line || "";
            if (!raw.trim()) return "";
            if (/^\s*#/.test(raw)) {
              return `<span class="cmd-comment">${escapeHtml(raw)}</span>`;
            }
            const match = raw.match(/^(\s*)([A-Za-z][\w.-]*(?:-[A-Za-z][\w.-]*)?)(.*)$/);
            if (!match) return escapeHtml(raw);
            const [, leading, cmd, tail] = match;
            let safeTail = escapeHtml(tail);
            safeTail = safeTail.replace(/(^|\s)(-[A-Za-z][A-Za-z0-9-]*)/g, "$1<span class=\"cmd-flag\">$2</span>");
            safeTail = safeTail.replace(/(\$[A-Za-z_][A-Za-z0-9_]*|\$\{[^}\n]+\})/g, "<span class=\"cmd-var\">$1</span>");
            safeTail = safeTail.replace(/(\"[^\"]*\"|'[^']*')/g, "<span class=\"cmd-string\">$1</span>");
            return `${escapeHtml(leading)}<span class="cmd-command">${escapeHtml(cmd)}</span>${safeTail}`;
          })
          .join("\n");
      }

      function applyCodeHighlighting(root) {
        if (!root) return;
        const nodes = root.querySelectorAll(".code-block pre code");
        nodes.forEach((node) => {
          try {
            const block = node.closest(".code-block");
            const hljsLang = block?.dataset?.hljsLang || "";
            if (hljsLang === "dos") {
              node.innerHTML = highlightCmdCode(node.textContent || "");
              node.classList.add("hljs", "language-dos");
              return;
            }
            if (["bash", "shell", "sh", "zsh", "fish"].includes(hljsLang)) {
              node.innerHTML = highlightShellCode(node.textContent || "");
              node.classList.add("hljs", `language-${hljsLang}`);
              return;
            }
            if (hljsLang === "powershell") {
              node.innerHTML = highlightPowerShellCode(node.textContent || "");
              node.classList.add("hljs", "language-powershell");
              return;
            }
            if (window.hljs && hljsLang && window.hljs.getLanguage(hljsLang)) {
              const highlighted = window.hljs.highlight(node.textContent || "", {
                language: hljsLang,
                ignoreIllegals: true,
              }).value;
              node.innerHTML = highlighted;
              node.classList.add("hljs", `language-${hljsLang}`);
            } else if (window.hljs) {
              window.hljs.highlightElement(node);
            }
          } catch (_) {}
        });
      }

      function stopTypingAnimation() {
        if (typingTimer) {
          clearTimeout(typingTimer);
          typingTimer = null;
        }
      }

      function animateAssistantReply(chatId, fullText) {
        stopTypingAnimation();
        return new Promise((resolve) => {
          const text = String(fullText || "");
          let index = 0;

          function step() {
            if (!pendingReply || pendingReply.chatId !== chatId || pendingReply.mode !== "typing") {
              stopTypingAnimation();
              resolve();
              return;
            }

            const remain = text.length - index;
            if (remain <= 0) {
              stopTypingAnimation();
              resolve();
              return;
            }

            const size =
              remain > 2200
                ? 30
                : remain > 1200
                  ? 22
                  : remain > 600
                    ? 14
                    : remain > 240
                      ? 9
                      : 5;
            index = Math.min(text.length, index + size);
            pendingReply.content = text.slice(0, index);
            renderMessages();

            const delay = index < text.length ? 14 : 0;
            if (delay) {
              typingTimer = setTimeout(step, delay);
            } else {
              stopTypingAnimation();
              resolve();
            }
          }

          step();
        });
      }

      function getAssistantIdentityName(message, chat = null) {

        const chars = Array.from(String(name || "").trim());
        if (!chars.length) return "A";
        const first = chars[0];
        if (/^[a-z]$/i.test(first)) return first.toUpperCase();

      function buildChatTitlePreview(message) {
        const text = String(message || "").replace(/\s+/g, " ").trim();
        if (!text) return "新对话";
        return text.length > 28 ? `${text.slice(0, 28).trim()}...` : text;
      }

      function splitStreamingMarkdown(text) {
        const source = String(text || "");
        const ticks = [...source.matchAll(/```/g)];
        if (ticks.length % 2 === 0) {
          return { stable: source, tail: "" };
        }
        const lastOpenIdx = ticks[ticks.length - 1]?.index ?? source.length;
        return {
          stable: source.slice(0, lastOpenIdx),
          tail: source.slice(lastOpenIdx),
        };
      }

      function renderStreamingContent(text) {
        const { stable, tail } = splitStreamingMarkdown(text);
        const stableHtml = stable ? renderMessageContent(stable) : "";
        const tailHtml = tail ? `<div class="streaming-tail">${escapeHtml(tail)}</div>` : "";
        if (!stableHtml && !tailHtml) {
          return `<div class="streaming-tail"></div>`;
        }
        return `${stableHtml}${tailHtml}`;
      }

      function hasActiveMessageSelection() {
        const sel = window.getSelection?.();
        if (!sel || sel.isCollapsed || sel.rangeCount < 1) return false;
        const container = document.getElementById("messages");
        if (!container) return false;
        const range = sel.getRangeAt(0);
        return container.contains(range.commonAncestorContainer);
      }

      function insertTextAtCursor(textarea, text) {
        const start = textarea.selectionStart;
        const end = textarea.selectionEnd;
        const value = textarea.value;
        textarea.value = `${value.slice(0, start)}${text}${value.slice(end)}`;
        const nextPos = start + text.length;
        textarea.selectionStart = textarea.selectionEnd = nextPos;
      }

      function isNearBottom(element, threshold = AUTO_SCROLL_BOTTOM_THRESHOLD) {
        if (!element) return true;
        const distance = element.scrollHeight - element.clientHeight - element.scrollTop;
        return distance <= threshold;
      }

      function setAutoScrollFromPosition(element = document.getElementById("messages")) {
        shouldAutoScroll = isNearBottom(element);
      }

      function scrollMessagesToBottomIfNeeded(force = false) {
        const msgEl = document.getElementById("messages");
        if (!msgEl) return;
        if (force || shouldAutoScroll) {
          msgEl.scrollTop = msgEl.scrollHeight;
          shouldAutoScroll = true;
        }

      function initMessageScrollTracking() {

        const msgEl = document.getElementById("messages");

        msgEl.addEventListener(
          "scroll",
          () => {
            setAutoScrollFromPosition(msgEl);
          },
          { passive: true },

        messageScrollListenerBound = true;
        setAutoScrollFromPosition(msgEl);

        if (!userMessages.length) {
          jumpList.innerHTML = `<div class="list-card" style="color:#6b7c88;">这个会话里还没有你的发言</div>`;
        } else {
          jumpList.innerHTML = userMessages
            .map((m, order) => {
