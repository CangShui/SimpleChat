name: Release Demo Site

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build site
        env:
          PYTHONUTF8: "1"
          LANG: C.UTF-8
          LC_ALL: C.UTF-8
          REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.event.release.tag_name || github.ref_name }}
          RELEASE_NAME: ${{ github.event.release.name || github.ref_name }}
          RELEASE_BODY: ${{ github.event.release.body || '' }}
          RELEASE_URL: ${{ github.event.release.html_url || format('https://github.com/{0}/releases', github.repository) }}
        run: |
          python - <<'PY'
          import html
          import os
          from pathlib import Path

          repo = os.environ["REPO"]
          owner, name = repo.split("/", 1)
          image = f"ghcr.io/{repo.lower()}"
          tag = os.environ.get("RELEASE_TAG") or "latest"
          release_name = os.environ.get("RELEASE_NAME") or tag
          release_body = os.environ.get("RELEASE_BODY") or "No release notes provided."
          release_url = os.environ.get("RELEASE_URL") or f"https://github.com/{repo}/releases"
          repo_url = f"https://github.com/{repo}"
          package_url = f"https://github.com/{owner}?tab=packages"

          def esc(value):
              return html.escape(str(value), quote=True)

          notes_html = "<br>".join(esc(release_body).splitlines())
          run_cmd = f"docker run -d --name simplechat -p 8000:8000 -v simplechat-data:/data {image}:{tag}"

          site = f"""<!doctype html>
          <html lang="zh-CN">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>{esc(name)} {esc(tag)}</title>
              <style>
                :root {{
                  color-scheme: dark;
                  --bg: #0d1420;
                  --panel: #142232;
                  --panel-2: #102033;
                  --text: #e8f1fb;
                  --muted: #9fb2c3;
                  --line: #2f465d;
                  --accent: #8fd8ef;
                }}
                * {{ box-sizing: border-box; }}
                body {{
                  margin: 0;
                  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
                  background: radial-gradient(circle at 0 0, #19334a 0, var(--bg) 42%);
                  color: var(--text);
                }}
                main {{
                  width: min(960px, calc(100% - 32px));
                  margin: 0 auto;
                  padding: 56px 0;
                }}
                h1 {{
                  margin: 0;
                  font-size: clamp(34px, 6vw, 64px);
                  letter-spacing: 0;
                }}
                .subtitle {{
                  margin: 12px 0 0;
                  color: var(--muted);
                  font-size: 18px;
                  line-height: 1.6;
                }}
                .grid {{
                  display: grid;
                  grid-template-columns: repeat(2, minmax(0, 1fr));
                  gap: 14px;
                  margin-top: 28px;
                }}
                section {{
                  border: 1px solid var(--line);
                  background: color-mix(in srgb, var(--panel) 86%, transparent);
                  border-radius: 12px;
                  padding: 18px;
                }}
                .wide {{ grid-column: 1 / -1; }}
                h2 {{
                  margin: 0 0 12px;
                  font-size: 18px;
                }}
                p {{
                  color: var(--muted);
                  line-height: 1.7;
                  margin: 0;
                }}
                code, pre {{
                  font-family: "Cascadia Mono", Consolas, monospace;
                }}
                pre {{
                  margin: 0;
                  padding: 14px;
                  overflow: auto;
                  border-radius: 10px;
                  background: #08111d;
                  border: 1px solid #22394f;
                  color: #d9edf8;
                  line-height: 1.6;
                }}
                a {{
                  color: var(--accent);
                  text-decoration: none;
                }}
                a:hover {{ text-decoration: underline; }}
                .links {{
                  display: flex;
                  flex-wrap: wrap;
                  gap: 10px;
                  margin-top: 20px;
                }}
                .link {{
                  display: inline-flex;
                  align-items: center;
                  min-height: 40px;
                  padding: 0 14px;
                  border: 1px solid var(--line);
                  border-radius: 10px;
                  background: var(--panel-2);
                }}
                @media (max-width: 720px) {{
                  .grid {{ grid-template-columns: 1fr; }}
                  main {{ padding: 34px 0; }}
                }}
              </style>
            </head>
            <body>
              <main>
                <h1>{esc(name)}</h1>
                <p class="subtitle">示例发布页会在 GitHub Release 发布后自动更新。当前版本：<strong>{esc(release_name)}</strong></p>

                <div class="links">
                  <a class="link" href="{esc(repo_url)}">GitHub 仓库</a>
                  <a class="link" href="{esc(release_url)}">当前 Release</a>
                  <a class="link" href="{esc(package_url)}">GHCR Packages</a>
                </div>

                <div class="grid">
                  <section>
                    <h2>Docker 镜像</h2>
                    <p><code>{esc(image)}:{esc(tag)}</code></p>
                  </section>
                  <section>
                    <h2>Latest 镜像</h2>
                    <p><code>{esc(image)}:latest</code></p>
                  </section>
                  <section class="wide">
                    <h2>快速运行</h2>
                    <pre>{esc(run_cmd)}</pre>
                  </section>
                  <section class="wide">
                    <h2>Release Notes</h2>
                    <p>{notes_html}</p>
                  </section>
                </div>
              </main>
            </body>
          </html>
          """

          out = Path("_site")
          out.mkdir(exist_ok=True)
          (out / "index.html").write_text(site, encoding="utf-8")
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
